function PanelTaquilla({ taquillas, cuentas, tempActiva, guardarTaquilla, borrarTaquilla }) {
  const vacio = () => ({
    fecha: hoyISO(), concepto: "",
    cuentaId: cuentas.find((c) => c.tipo === "efectivo")?.id || cuentas[0]?.id || "",
    forma: "Efectivo",
    e5desde: "", e5hasta: "", precio5: "5",
    e10desde: "", e10hasta: "", precio10: "10",
    aDesde: "", aHasta: "", precioAnt: "5",
    rDesde: "", rHasta: "", precioTira: "1",
  });
  const [f, setF] = useState(vacio());
  const [editIdT, setEditIdT] = useState(null);

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";

  const n5 = vendidas(f.e5desde, f.e5hasta);
  const n10 = vendidas(f.e10desde, f.e10hasta);
  const nAnt = vendidas(f.aDesde, f.aHasta);
  const nTiras = vendidas(f.rDesde, f.rHasta);
  const totEnt = n5 * num(f.precio5) + n10 * num(f.precio10) + nAnt * num(f.precioAnt);
  const totRifa = nTiras * num(f.precioTira);

  const guardar = () => {
    if (guardarTaquilla(f, editIdT)) { setF(vacio()); setEditIdT(null); }
  };

  const editar = (t) => {
    setEditIdT(t.id);
    setF({
      fecha: t.fecha, concepto: t.concepto, cuentaId: t.cuentaId, forma: t.forma,
      e5desde: t.e5desde || "", e5hasta: t.e5hasta || "", precio5: String(t.precio5 ?? 5),
      e10desde: t.e10desde || "", e10hasta: t.e10hasta || "", precio10: String(t.precio10 ?? 10),
      aDesde: t.aDesde || "", aHasta: t.aHasta || "", precioAnt: String(t.precioAnt ?? 5),
      rDesde: t.rDesde || "", rHasta: t.rHasta || "", precioTira: String(t.precioTira ?? 1),
    });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const lista = [...taquillas]
    .filter((t) => temporadaDe(t.fecha) === tempActiva)
    .sort((a, b) => (a.fecha < b.fecha ? 1 : -1));

  const totales = lista.reduce((acc, t) => {
    const a5 = vendidas(t.e5desde, t.e5hasta), a10 = vendidas(t.e10desde, t.e10hasta),
      aa = vendidas(t.aDesde, t.aHasta), at = vendidas(t.rDesde, t.rHasta);
    acc.n5 += a5; acc.n10 += a10; acc.nAnt += aa; acc.tiras += at;
    acc.ent += a5 * num(t.precio5) + a10 * num(t.precio10) + aa * num(t.precioAnt);
    acc.rifa += at * num(t.precioTira);
    return acc;
  }, { n5: 0, n10: 0, nAnt: 0, tiras: 0, ent: 0, rifa: 0 });

  return (
    <>
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg mr-auto">Taquilla y rifas · temporada {tempActiva}</h2>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-6 gap-3">
        {[
          ["Entradas 5 €", totales.n5, "text-slate-800"],
          ["Entradas 10 €", totales.n10, "text-slate-800"],
          ["Venta anticipada", totales.nAnt, "text-slate-800"],
          ["Tiras de rifa", totales.tiras, "text-slate-800"],
          ["Recaudado taquilla", eur(totales.ent), "text-emerald-700"],
          ["Recaudado rifas", eur(totales.rifa), "text-emerald-700"],
        ].map(([l, v, c]) => (
          <div key={l} className="bg-white rounded-xl border border-slate-200 p-4">
            <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold">{l}</div>
            <div className={`text-xl font-bold tabular-nums mt-1 ${c}`}>{v}</div>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="font-bold mb-3">{editIdT ? "Editar taquilla" : "Anotar taquilla de un partido"}</h3>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
          <label className="text-xs font-semibold text-slate-600">Fecha del partido
            <input type="date" value={f.fecha} onChange={(e) => setF({ ...f, fecha: e.target.value })} className={inp} />
          </label>
          <label className="col-span-2 text-xs font-semibold text-slate-600">Partido / concepto
            <input placeholder="p. ej. vs CD Rival — jornada 5" value={f.concepto}
              onChange={(e) => setF({ ...f, concepto: e.target.value })} className={inp} />
          </label>
          <label className="text-xs font-semibold text-slate-600">Cuenta donde entra
            <select value={f.cuentaId} onChange={(e) => setF({ ...f, cuentaId: e.target.value })} className={sel}>
              {cuentas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </label>
        </div>

        <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-3">
          <div className="bg-slate-50 rounded-lg p-3">
            <div className="text-sm font-bold mb-2">Entradas de 5 €</div>
            <div className="grid grid-cols-3 gap-2">
              <label className="text-[11px] font-semibold text-slate-500">Nº desde
                <input inputMode="numeric" placeholder="1" value={f.e5desde} onChange={(e) => setF({ ...f, e5desde: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Nº hasta
                <input inputMode="numeric" placeholder="120" value={f.e5hasta} onChange={(e) => setF({ ...f, e5hasta: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Precio (€)
                <input inputMode="decimal" value={f.precio5} onChange={(e) => setF({ ...f, precio5: e.target.value })} className={inp + " tabular-nums"} />
              </label>
            </div>
            <div className="text-xs text-slate-600 mt-2 tabular-nums">
              {n5 > 0 ? <>Vendidas: <b>{n5}</b> · Recaudación: <b className="text-emerald-700">{eur(n5 * num(f.precio5))}</b></> : "Deja en blanco si no se vendieron."}
            </div>
          </div>

          <div className="bg-slate-50 rounded-lg p-3">
            <div className="text-sm font-bold mb-2">Entradas de 10 €</div>
            <div className="grid grid-cols-3 gap-2">
              <label className="text-[11px] font-semibold text-slate-500">Nº desde
                <input inputMode="numeric" placeholder="1" value={f.e10desde} onChange={(e) => setF({ ...f, e10desde: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Nº hasta
                <input inputMode="numeric" placeholder="40" value={f.e10hasta} onChange={(e) => setF({ ...f, e10hasta: e.target.value })} className={inp + " tabular-nums"} />

            <div className="text-xs text-slate-600 mt-2 tabular-nums">

            <div className="grid grid-cols-3 gap-2">
              <label className="text-[11px] font-semibold text-slate-500">Nº desde
                <input inputMode="numeric" placeholder="1" value={f.aDesde} onChange={(e) => setF({ ...f, aDesde: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Nº hasta
                <input inputMode="numeric" placeholder="60" value={f.aHasta} onChange={(e) => setF({ ...f, aHasta: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Precio (€)
                <input inputMode="decimal" value={f.precioAnt} onChange={(e) => setF({ ...f, precioAnt: e.target.value })} className={inp + " tabular-nums"} />
              </label>
            </div>
            <div className="text-xs text-slate-600 mt-2 tabular-nums">
              {nAnt > 0 ? <>Vendidas: <b>{nAnt}</b> · Recaudación: <b className="text-emerald-700">{eur(nAnt * num(f.precioAnt))}</b></> : "Deja en blanco si no hubo venta anticipada."}
            </div>
          </div>

          <div className="bg-slate-50 rounded-lg p-3">
            <div className="text-sm font-bold mb-2">Rifa (100 tiras × 10 números)</div>
            <div className="grid grid-cols-3 gap-2">
              <label className="text-[11px] font-semibold text-slate-500">Tira desde
                <input inputMode="numeric" placeholder="1" value={f.rDesde} onChange={(e) => setF({ ...f, rDesde: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Tira hasta
                <input inputMode="numeric" placeholder="100" value={f.rHasta} onChange={(e) => setF({ ...f, rHasta: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">€/tira
                <select value={f.precioTira} onChange={(e) => setF({ ...f, precioTira: e.target.value })} className={sel + " tabular-nums"}>
                  <option value="1">1,00 €</option>
                  <option value="2">2,00 €</option>
                </select>
              </label>
            </div>
            <div className="text-xs text-slate-600 mt-2 tabular-nums">
              {nTiras > 0
                ? <>Tiras: <b>{nTiras}</b> de 100 ({nTiras * 10} números)</>
                : "Deja en blanco si no hubo rifa."}
            </div>
            <div className="mt-2 flex items-center justify-between bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
              <span className="text-[11px] font-semibold uppercase tracking-wide text-emerald-700">Total recaudado rifa</span>
              <span className="text-base font-bold tabular-nums text-emerald-700">{eur(totRifa)}</span>
            </div>
          </div>
        </div>

        <div className="flex flex-wrap items-center gap-3 mt-4">
          <div className="text-sm font-bold tabular-nums mr-auto">
            Total del partido: <span className="text-emerald-700">{eur(totEnt + totRifa)}</span>
            {totEnt > 0 && totRifa > 0 && <span className="font-normal text-slate-500"> (taquilla {eur(totEnt)} + rifa {eur(totRifa)})</span>}
          </div>
          <button onClick={guardar} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-4 py-2 text-sm">
            {editIdT ? "Guardar cambios" : "Anotar taquilla"}
          </button>
          {editIdT && (
            <button onClick={() => { setEditIdT(null); setF(vacio()); }}
              className="border border-slate-300 rounded-lg px-3 py-2 text-sm hover:bg-slate-50">Cancelar</button>
          )}
        </div>
        <p className="text-xs text-slate-500 mt-2">
          Al guardar se crean automáticamente los ingresos en «Taquilla (entradas)» y «Rifas». Si editas o borras la taquilla, sus ingresos se actualizan o eliminan solos.
        </p>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">
              <th className="px-4 py-2">Fecha</th>
              <th className="px-2 py-2">Partido</th>
              <th className="px-2 py-2">Entradas 5 €</th>
              <th className="px-2 py-2">Entradas 10 €</th>
              <th className="px-2 py-2">Anticipada</th>
              <th className="px-2 py-2">Rifa</th>
              <th className="px-2 py-2 text-right">Taquilla</th>
              <th className="px-2 py-2 text-right">Rifa €</th>
              <th className="px-2 py-2 text-right">Total</th>
              <th className="px-2 py-2"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {lista.length === 0 && (
              <tr><td colSpan={10} className="px-4 py-6 text-slate-500">Sin taquillas anotadas en la temporada {tempActiva}.</td></tr>
            )}
            {lista.map((t) => {
              const a5 = vendidas(t.e5desde, t.e5hasta);
              const a10 = vendidas(t.e10desde, t.e10hasta);
              const aa = vendidas(t.aDesde, t.aHasta);
              const at = vendidas(t.rDesde, t.rHasta);
              const tEnt = a5 * num(t.precio5) + a10 * num(t.precio10) + aa * num(t.precioAnt);
              const tRifa = at * num(t.precioTira);
              return (
                <tr key={t.id} className="hover:bg-slate-50">
                  <td className="px-4 py-2 tabular-nums text-slate-600 whitespace-nowrap">{fmtFecha(t.fecha)}</td>
                  <td className="px-2 py-2 max-w-44 truncate font-semibold">{t.concepto}</td>
                  <td className="px-2 py-2 tabular-nums text-slate-600 whitespace-nowrap">{a5 > 0 ? `${t.e5desde}–${t.e5hasta} (${a5})` : "—"}</td>
                  <td className="px-2 py-2 tabular-nums text-slate-600 whitespace-nowrap">{a10 > 0 ? `${t.e10desde}–${t.e10hasta} (${a10})` : "—"}</td>
                  <td className="px-2 py-2 tabular-nums text-slate-600 whitespace-nowrap">{aa > 0 ? `${t.aDesde}–${t.aHasta} (${aa})` : "—"}</td>
                  <td className="px-2 py-2 tabular-nums text-slate-600 whitespace-nowrap">{at > 0 ? `tiras ${t.rDesde}–${t.rHasta} (${at})` : "—"}</td>
                  <td className="px-2 py-2 text-right tabular-nums text-emerald-700 font-semibold">{tEnt > 0 ? eur(tEnt) : "—"}</td>
                  <td className="px-2 py-2 text-right tabular-nums text-emerald-700 font-semibold">{tRifa > 0 ? eur(tRifa) : "—"}</td>
                  <td className="px-2 py-2 text-right tabular-nums font-bold">{eur(tEnt + tRifa)}</td>
                  <td className="px-2 py-2 whitespace-nowrap text-right">
                    <button onClick={() => editar(t)} className="text-amber-700 hover:underline text-xs font-semibold mr-2">Editar</button>
                    <button onClick={() => borrarTaquilla(t.id)} className="text-red-600 hover:underline text-xs font-semibold">Borrar</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
          {lista.length > 0 && (
            <tfoot>
              <tr className="border-t-2 border-slate-300 bg-slate-50 font-bold">
                <td className="px-4 py-2" colSpan={2}>Total temporada</td>
                <td className="px-2 py-2 tabular-nums">{totales.n5}</td>
                <td className="px-2 py-2 tabular-nums">{totales.n10}</td>
                <td className="px-2 py-2 tabular-nums">{totales.nAnt}</td>
                <td className="px-2 py-2 tabular-nums">{totales.tiras} tiras</td>
                <td className="px-2 py-2 text-right tabular-nums text-emerald-700">{eur(totales.ent)}</td>
                <td className="px-2 py-2 text-right tabular-nums text-emerald-700">{eur(totales.rifa)}</td>
                <td className="px-2 py-2 text-right tabular-nums">{eur(totales.ent + totales.rifa)}</td>
                <td></td>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </>
  );
}

// ==================================================================
// Panel de Caja
// ==================================================================
function PanelCaja({ cuentas, movs, saldos, cuentaNombre, categorias, anotarRapido, editarMov, borrarMov, pedirConfirmacion }) {
  const cajas = cuentas.filter((c) => c.tipo === "efectivo");
  const [cajaId, setCajaId] = useState(cajas[0]?.id || "");
  const [contado, setContado] = useState("");
  const [rapido, setRapido] = useState({ fecha: hoyISO(), tipo: "ingreso", categoria: "", empresa: "", concepto: "", importe: "" });

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";

  const caja = cuentas.find((c) => c.id === cajaId) || cajas[0];
  const idCaja = caja?.id;

  const filas = useMemo(() => {
    if (!idCaja) return [];
    const rel = movs
      .filter((m) => m.cuentaId === idCaja || m.destinoId === idCaja)
      .sort((a, b) => (a.fecha > b.fecha ? 1 : a.fecha < b.fecha ? -1 : a.id > b.id ? 1 : -1));
    let s = num(caja.saldoInicial);
    const out = rel.map((m) => {
      let delta = 0;
      if (m.tipo === "ingreso") delta = num(m.importe);
      else if (m.tipo === "gasto") delta = -num(m.importe);
      else if (m.tipo === "traspaso") delta = m.destinoId === idCaja ? num(m.importe) : -num(m.importe);
      s += delta;
      return { m, delta, saldo: s };
    });
    return out.reverse();
  }, [movs, idCaja, caja]);

  const saldoCaja = idCaja ? saldos[idCaja] || 0 : 0;
  const dif = contado !== "" ? num(contado) - saldoCaja : null;

  const anotar = () => {
    const imp = num(rapido.importe);
    if (imp <= 0 || !rapido.categoria) return;
    const mov = {
      fecha: rapido.fecha, tipo: rapido.tipo, categoria: rapido.categoria,
      empresa: (rapido.empresa || "").trim(),
      concepto: rapido.concepto.trim(), importe: imp, cuentaId: idCaja, forma: "Efectivo",
    };
    pedirConfirmacion(mov, () => {
      anotarRapido(mov);
      setRapido((r) => ({ ...r, empresa: "", concepto: "", importe: "" }));
    });
  };

  if (!caja) {
    return <p className="text-sm text-slate-500">No hay ninguna cuenta de tipo «Efectivo (caja)». Crea una en Ajustes → Cuentas del club.</p>;
  }

  return (
    <>
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg mr-auto">Libro de caja (efectivo)</h2>
        {cajas.length > 1 && (
          <select value={cajaId} onChange={(e) => setCajaId(e.target.value)} className="border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white">
            {cajas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        )}
      </div>

      <div className="grid sm:grid-cols-3 gap-4">
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold">Saldo en caja</div>
          <div className={`text-2xl font-bold tabular-nums mt-1 ${saldoCaja < 0 ? "text-red-600" : "text-slate-800"}`}>{eur(saldoCaja)}</div>
          <div className="text-xs text-slate-500 mt-1 tabular-nums">Saldo inicial: {eur(caja.saldoInicial)}</div>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 p-4 sm:col-span-2">
          <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-1">Arqueo de caja</div>
          <div className="flex flex-wrap items-center gap-3">
            <label className="text-sm text-slate-600">Efectivo contado (€):
              <input inputMode="decimal" placeholder="0,00" value={contado} onChange={(e) => setContado(e.target.value)}
                className="ml-2 border border-slate-300 rounded-lg px-2 py-1.5 text-sm tabular-nums w-28" />
            </label>
            {dif !== null && (
              <span className={`text-sm font-bold tabular-nums ${Math.abs(dif) < 0.005 ? "text-emerald-700" : "text-red-600"}`}>
                {Math.abs(dif) < 0.005 ? "✓ La caja cuadra" : `Descuadre: ${dif > 0 ? "+" : ""}${eur(dif)}`}
              </span>
            )}
          </div>
          <p className="text-xs text-slate-500 mt-1">Cuenta el efectivo real y compáralo con el saldo teórico. Si falta o sobra, revisa apuntes o anota la diferencia como movimiento.</p>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="font-bold mb-3">Anotar en caja (efectivo)</h3>
        <div className="grid grid-cols-2 sm:grid-cols-6 gap-3">
          <label className="text-xs font-semibold text-slate-600">Fecha
            <input type="date" value={rapido.fecha} onChange={(e) => setRapido({ ...rapido, fecha: e.target.value })} className={inp} />
          </label>
          <label className="text-xs font-semibold text-slate-600">Tipo
            <select value={rapido.tipo} onChange={(e) => setRapido({ ...rapido, tipo: e.target.value, categoria: "" })} className={sel}>
              <option value="ingreso">Entrada (ingreso)</option>
              <option value="gasto">Salida (gasto)</option>
            </select>
          </label>
          <label className="col-span-2 text-xs font-semibold text-slate-600">Categoría
            <select value={rapido.categoria} onChange={(e) => setRapido({ ...rapido, categoria: e.target.value })} className={sel}>
              <option value="">— Elegir —</option>
              {(rapido.tipo === "ingreso" ? categorias.ingreso : categorias.gasto).map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </label>
          <label className="text-xs font-semibold text-slate-600">Importe (€)
            <input inputMode="decimal" placeholder="0,00" value={rapido.importe}
              onChange={(e) => setRapido({ ...rapido, importe: e.target.value })} className={inp + " tabular-nums"} />
          </label>
          <div className="flex items-end">
            <button onClick={anotar} className="w-full bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-4 py-2 text-sm">Anotar</button>
          </div>
          <label className="col-span-2 sm:col-span-2 text-xs font-semibold text-slate-600">Empresa / persona
            <input placeholder="Quién ingresa o cobra" value={rapido.empresa}
              onChange={(e) => setRapido({ ...rapido, empresa: e.target.value })} className={inp} />
          </label>
          <label className="col-span-2 sm:col-span-4 text-xs font-semibold text-slate-600">Concepto
            <input placeholder="p. ej. venta de bufandas, pago al árbitro en mano…" value={rapido.concepto}
              onChange={(e) => setRapido({ ...rapido, concepto: e.target.value })} className={inp} />
          </label>
        </div>
        <p className="text-xs text-slate-500 mt-2">Para llevar efectivo al banco (o traerlo), usa un «Traspaso entre cuentas» en la pestaña Movimientos.</p>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">
              <th className="px-4 py-2">Fecha</th>
              <th className="px-2 py-2">Empresa / persona</th>
              <th className="px-2 py-2">Concepto</th>
              <th className="px-2 py-2">Categoría</th>
              <th className="px-2 py-2 text-right">Entrada</th>
              <th className="px-2 py-2 text-right">Salida</th>
              <th className="px-4 py-2 text-right">Saldo</th>
              <th className="px-2 py-2"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {filas.length === 0 && (
              <tr><td colSpan={8} className="px-4 py-6 text-slate-500">La caja no tiene movimientos todavía.</td></tr>
            )}
            {filas.map(({ m, delta, saldo }) => (
              <tr key={m.id} className="hover:bg-slate-50">
                <td className="px-4 py-2 tabular-nums text-slate-600 whitespace-nowrap">{fmtFecha(m.fecha)}</td>
                <td className="px-2 py-2 max-w-40 truncate font-medium text-slate-700">{m.empresa || <span className="text-slate-400">—</span>}</td>
                <td className="px-2 py-2 max-w-52 truncate">{m.concepto || m.categoria}
                  {m.tipo === "traspaso" && <span className="text-xs text-amber-700 ml-1">(traspaso {m.destinoId === caja.id ? "desde" : "a"} {cuentaNombre(m.destinoId === caja.id ? m.cuentaId : m.destinoId)})</span>}
                </td>
                <td className="px-2 py-2 max-w-36 truncate text-slate-600">{m.categoria}</td>
                <td className="px-2 py-2 text-right tabular-nums text-emerald-700 font-semibold">{delta > 0 ? eur(delta) : ""}</td>
                <td className="px-2 py-2 text-right tabular-nums text-red-600 font-semibold">{delta < 0 ? eur(-delta) : ""}</td>
                <td className={`px-4 py-2 text-right tabular-nums font-bold ${saldo < 0 ? "text-red-600" : "text-slate-800"}`}>{eur(saldo)}</td>
                <td className="px-2 py-2 whitespace-nowrap text-right">
                  <button onClick={() => editarMov(m)} className="text-amber-700 hover:underline text-xs font-semibold mr-2">Editar</button>
                  <button onClick={() => borrarMov(m.id)} className="text-red-600 hover:underline text-xs font-semibold">Borrar</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

// ==================================================================
// Panel de Cartelería / Publicidad con IVA
// ==================================================================
function PanelCarteleria({ cartelera, cuentas, tempActiva, guardarCartel, borrarCartel, cuentaNombre }) {
  const vacio = () => ({
    fecha: hoyISO(), cliente: "", tipo: "campo", concepto: "",
    base: "", iva: "21", estado: "cobrado",
    cuentaId: cuentas.find((c) => c.tipo === "banco")?.id || cuentas[0]?.id || "",
    forma: "Transferencia",
  });
  const [f, setF] = useState(vacio());
  const [editIdC, setEditIdC] = useState(null);
  const [filtroTipo, setFiltroTipo] = useState("todos");
  const [filtroEstado, setFiltroEstado] = useState("todos");

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";

  const base = num(f.base);
  const ivaDef = IVAS.find((i) => i.id === f.iva) || IVAS[2];
  const cuotaIva = Math.round(base * ivaDef.pct) / 100;
  const total = base + cuotaIva;

  const guardar = () => {
    if (guardarCartel(f, editIdC)) { setF(vacio()); setEditIdC(null); }
  };

  const editar = (c) => {
    setEditIdC(c.id);
    setF({
      fecha: c.fecha, cliente: c.cliente, tipo: c.tipo, concepto: c.concepto || "",
      base: String(c.base).replace(".", ","), iva: c.iva, estado: c.estado,
      cuentaId: c.cuentaId || cuentas[0]?.id || "", forma: c.forma || "Transferencia",
    });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const deTemporada = cartelera.filter((c) => temporadaDe(c.fecha) === tempActiva);
  const lista = deTemporada
    .filter((c) => (filtroTipo === "todos" || c.tipo === filtroTipo) && (filtroEstado === "todos" || c.estado === filtroEstado))
    .sort((a, b) => (a.fecha < b.fecha ? 1 : -1));

  const tot = deTemporada.reduce((acc, c) => {
    acc.base += c.base; acc.iva += c.cuotaIva; acc.total += c.total;
    if (c.estado === "cobrado") acc.cobrado += c.total; else acc.pendiente += c.total;
    return acc;
  }, { base: 0, iva: 0, total: 0, cobrado: 0, pendiente: 0 });

  const porTipo = Object.keys(TIPOS_CART).map((t) => {
    const cs = deTemporada.filter((c) => c.tipo === t);
    return {
      tipo: t, n: cs.length,
      base: cs.reduce((s, c) => s + c.base, 0),
      iva: cs.reduce((s, c) => s + c.cuotaIva, 0),
      total: cs.reduce((s, c) => s + c.total, 0),
      cobrado: cs.filter((c) => c.estado === "cobrado").reduce((s, c) => s + c.total, 0),
    };
  }).filter((r) => r.n > 0);

  return (
    <>
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg mr-auto">Cartelería y publicidad · temporada {tempActiva}</h2>
      </div>

      {/* Totales */}
      <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
        {[
          ["Base imponible", eur(tot.base), "text-slate-800"],
          ["IVA repercutido", eur(tot.iva), "text-slate-800"],
          ["Total facturado", eur(tot.total), "text-slate-800"],
          ["Cobrado", eur(tot.cobrado), "text-emerald-700"],

          </label>
          <label className="col-span-2 text-xs font-semibold text-slate-600">Anunciante / patrocinador
            <input placeholder="p. ej. Bar El Campo, Talleres Pérez…" value={f.cliente}

            <select value={f.tipo} onChange={(e) => setF({ ...f, tipo: e.target.value })} className={sel}>

            </select>
          </label>

            <input inputMode="decimal" placeholder="0,00" value={f.base}

            <tbody className="divide-y divide-slate-100">

              )}
              {lista.map((c) => (
                <tr key={c.id} className="hover:bg-slate-50">
                  <td className="px-4 py-2 tabular-nums text-slate-600 whitespace-nowrap">{fmtFecha(c.fecha)}</td>
                  <td className="px-2 py-2 max-w-40 truncate font-semibold">{c.cliente}

                  <td className="px-2 py-2 text-right tabular-nums">{eur(c.base)}</td>
                  <td className="px-2 py-2 text-right tabular-nums text-slate-600">
                    {c.iva === "exento" ? <span className="text-xs">Exento</span> : eur(c.cuotaIva)}

                  <td className="px-2 py-2 max-w-32 truncate text-slate-600">{c.estado === "cobrado" ? cuentaNombre(c.cuentaId) : "—"}</td>
                  <td className="px-2 py-2 whitespace-nowrap text-right">

            {lista.length > 0 && (
              <tfoot>
                <tr className="border-t-2 border-slate-300 bg-slate-50 font-bold">
                  <td className="px-4 py-2" colSpan={3}>Total mostrado</td>

            )}

      </div>
    </>
  );
}

// ==================================================================
// Panel de cuentas (Ajustes)
// ==================================================================
function PanelCuentas({ data, persist, saldos, setAviso }) {
  const [nueva, setNueva] = useState({ nombre: "", tipo: "banco", saldoInicial: "" });
  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm font-normal";

  const actualizar = (id, campo, valor) =>
    persist({ ...data, cuentas: data.cuentas.map((c) => (c.id === id ? { ...c, [campo]: valor } : c)) });

  const quitar = (id) => {
    if (data.movimientos.some((m) => m.cuentaId === id || m.destinoId === id))
      return setAviso("No se puede quitar: esta cuenta tiene movimientos anotados.");
    persist({ ...data, cuentas: data.cuentas.filter((c) => c.id !== id) });
  };

  const añadir = () => {
    if (!nueva.nombre.trim()) return setAviso("Escribe el nombre de la cuenta.");
    persist({ ...data, cuentas: [...data.cuentas, { id: uid("cta"), nombre: nueva.nombre.trim(), tipo: nueva.tipo, saldoInicial: num(nueva.saldoInicial) }] });
    setNueva({ nombre: "", tipo: "banco", saldoInicial: "" });
    setAviso("Cuenta añadida.");
  };

  return (
    <div className="bg-white rounded-xl border border-slate-200 p-4">
      <h2 className="font-bold mb-2">Cuentas del club</h2>
      <div className="space-y-2 mb-4">
        {data.cuentas.map((c) => (
          <div key={c.id} className="bg-slate-50 rounded-lg p-3">
            <div className="grid grid-cols-2 gap-2">
              <label className="text-[11px] font-semibold text-slate-500">Nombre
                <input value={c.nombre} onChange={(e) => actualizar(c.id, "nombre", e.target.value)} className={inp} />
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Tipo
                <select value={c.tipo} onChange={(e) => actualizar(c.id, "tipo", e.target.value)} className={inp + " bg-white"}>
                  {Object.entries(TIPOS_CUENTA).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                </select>
              </label>
              <label className="text-[11px] font-semibold text-slate-500">Saldo inicial (€)
                <input inputMode="decimal" value={c.saldoInicial}
                  onChange={(e) => actualizar(c.id, "saldoInicial", e.target.value.replace(",", "."))} className={inp + " tabular-nums"} />
              </label>
              <div className="flex items-end justify-between gap-2">
                <div className="text-xs text-slate-500">Saldo actual<br />
                  <span className={`text-sm font-bold tabular-nums ${saldos[c.id] < 0 ? "text-red-600" : "text-slate-800"}`}>{eur(saldos[c.id])}</span>
                </div>
                <button onClick={() => quitar(c.id)} className="text-slate-400 hover:text-red-600 text-xs font-semibold pb-1">Quitar</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      <h3 className="text-sm font-bold mb-1">Añadir cuenta</h3>
      <div className="grid grid-cols-2 gap-2">
        <input placeholder="Nombre (p. ej. Banco Santander)" value={nueva.nombre}
          onChange={(e) => setNueva({ ...nueva, nombre: e.target.value })} className={inp} />
        <select value={nueva.tipo} onChange={(e) => setNueva({ ...nueva, tipo: e.target.value })} className={inp + " bg-white"}>
          {Object.entries(TIPOS_CUENTA).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
        </select>
        <input placeholder="Saldo inicial (€)" inputMode="decimal" value={nueva.saldoInicial}
          onChange={(e) => setNueva({ ...nueva, saldoInicial: e.target.value })} className={inp + " tabular-nums"} />
        <button onClick={añadir} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-3 py-1.5 text-sm mt-1">Añadir cuenta</button>
      </div>
      <p className="text-xs text-slate-500 mt-2">
        El saldo inicial es lo que había en cada cuenta el día que empiezas a usar la aplicación — también en la cuenta Federación y la cuenta Mutualidad. Después, esos saldos se mueven anotando ingresos, gastos o traspasos sobre esas cuentas.
      </p>
    </div>
  );
}

// ==================================================================
// Panel compartido de cuotas: Socios y Cantera
// ==================================================================
function PanelCuotas({ modo, titulo, personas, equipos, catSocios, cuentas, tempActiva,
  pagadoPor, pagosDe, cuentaNombre, registrarPago, borrarPago, onGuardar, setAviso }) {

  const esSocio = modo === "socio";
  const refTipo = esSocio ? "socio" : "jugador";
  const sigNumero = esSocio ? (personas.reduce((mx, p) => Math.max(mx, p.numero || 0), 0) + 1) : null;

  const vacio = () => esSocio
    ? { numero: sigNumero, nombre: "", apellidos: "", categoria: catSocios?.[0]?.nombre || "", telefono: "", dni: "", localidad: "", genero: "", cuota: catSocios?.[0] ? String(catSocios[0].cuota) : "" }
    : { nombre: "", apellidos: "", equipo: equipos?.[0] || "", cuota: "" };

  const [alta, setAlta] = useState(vacio());
  const [editandoId, setEditandoId] = useState(null);
  const [filtroEq, setFiltroEq] = useState("todos");
  const [filtroCat, setFiltroCat] = useState("todas");
  const [filtroGen, setFiltroGen] = useState("todos");
  const [filtroEstado, setFiltroEstado] = useState("todos");
  const [busca, setBusca] = useState("");
  const [abierto, setAbierto] = useState(null);
  const [pago, setPago] = useState(null);

  useEffect(() => { if (!editandoId) setAlta((a) => ({ ...a, numero: sigNumero })); }, [personas.length]); // eslint-disable-line

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";

  const elegirCategoria = (nombre) => {
    const cat = catSocios?.find((c) => c.nombre === nombre);
    setAlta((a) => ({ ...a, categoria: nombre, cuota: cat ? String(cat.cuota).replace(".", ",") : a.cuota }));
  };

  const guardarPersona = () => {
    if (!alta.nombre.trim()) return setAviso("Escribe el nombre.");
    if (esSocio && (!alta.numero || alta.numero <= 0)) return setAviso("El número de socio debe ser mayor que cero.");
    if (esSocio && personas.some((p) => p.numero === Number(alta.numero) && p.id !== editandoId))
      return setAviso(`El nº de socio ${alta.numero} ya está asignado.`);
    if (!esSocio && !alta.equipo) return setAviso("Elige el equipo.");
    const persona = {
      id: editandoId || uid(esSocio ? "s" : "j"),
      nombre: alta.nombre.trim(),
      apellidos: (alta.apellidos || "").trim(),
      cuota: num(alta.cuota),
      ...(esSocio
        ? { numero: Number(alta.numero), categoria: alta.categoria || "", telefono: (alta.telefono || "").trim(),
            dni: (alta.dni || "").trim().toUpperCase(), localidad: (alta.localidad || "").trim(), genero: alta.genero || "" }
        : { equipo: alta.equipo }),
    };
    onGuardar(editandoId ? personas.map((p) => (p.id === editandoId ? persona : p)) : [...personas, persona]);
    setAlta(vacio());
    setEditandoId(null);
    setAviso(editandoId ? "Ficha actualizada." : (esSocio ? `Socio nº ${persona.numero} dado de alta.` : "Jugador dado de alta."));
  };

  const editarPersona = (p) => {
    setEditandoId(p.id);
    setAlta(esSocio
      ? { numero: p.numero, nombre: p.nombre, apellidos: p.apellidos || "", categoria: p.categoria || "", telefono: p.telefono || "",
          dni: p.dni || "", localidad: p.localidad || "", genero: p.genero || "", cuota: String(p.cuota || "") }
      : { nombre: p.nombre, apellidos: p.apellidos || "", equipo: p.equipo, cuota: String(p.cuota || "") });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const quitarPersona = (p) => {
    onGuardar(personas.filter((x) => x.id !== p.id));
    setAviso("Ficha eliminada. Sus pagos anotados se conservan en Movimientos.");
  };

  const estadoDe = (p) => {
    const pagado = pagadoPor(refTipo, p.id);
    const cuota = num(p.cuota);
    if (cuota <= 0) return pagado > 0 ? "pagado" : "sincuota";
    if (pagado >= cuota) return "pagado";
    if (pagado > 0) return "parcial";
    return "pendiente";
  };

  const lista = personas
    .filter((p) => {
      if (!esSocio && filtroEq !== "todos" && p.equipo !== filtroEq) return false;
      if (esSocio && filtroCat !== "todas" && (p.categoria || "") !== filtroCat) return false;
      if (esSocio && filtroGen !== "todos" && (p.genero || "Sin indicar") !== filtroGen) return false;
      if (filtroEstado !== "todos" && estadoDe(p) !== filtroEstado) return false;
      if (busca && !`${p.nombre} ${p.apellidos || ""} ${esSocio ? `${p.numero} ${p.categoria || ""} ${p.dni || ""} ${p.localidad || ""}` : p.equipo}`.toLowerCase().includes(busca.toLowerCase())) return false;
      return true;
    })
    .sort((a, b) => esSocio ? (a.numero - b.numero) : (a.equipo === b.equipo ? apellidosNombre(a).localeCompare(apellidosNombre(b)) : a.equipo.localeCompare(b.equipo)));

  const resumen = useMemo(() => {
    let cuotas = 0, cobrado = 0;
    for (const p of personas) {
      cuotas += num(p.cuota);
      cobrado += pagadoPor(refTipo, p.id);
    }
    return { n: personas.length, cuotas, cobrado, pendiente: Math.max(0, cuotas - cobrado) };
  }, [personas, pagadoPor, refTipo]);

  const resumenGrupos = useMemo(() => {
    if (esSocio) {
      if (!catSocios) return [];
      const nombres = [...new Set([...catSocios.map((c) => c.nombre), ...personas.map((p) => p.categoria || "Sin categoría")])];
      return nombres.map((cat) => {
        const ps = personas.filter((p) => (p.categoria || "Sin categoría") === cat);
        const cuotas = ps.reduce((s, p) => s + num(p.cuota), 0);
        const cobrado = ps.reduce((s, p) => s + pagadoPor(refTipo, p.id), 0);
        return { grupo: cat, n: ps.length, cuotas, cobrado, pendiente: Math.max(0, cuotas - cobrado) };
      }).filter((r) => r.n > 0);
    }
    if (!equipos) return [];
    return equipos.map((eq) => {
      const js = personas.filter((p) => p.equipo === eq);
      const cuotas = js.reduce((s, p) => s + num(p.cuota), 0);
      const cobrado = js.reduce((s, p) => s + pagadoPor(refTipo, p.id), 0);
      return { grupo: eq, n: js.length, cuotas, cobrado, pendiente: Math.max(0, cuotas - cobrado) };
    }).filter((r) => r.n > 0);
  }, [esSocio, catSocios, equipos, personas, pagadoPor, refTipo]);

  // Control de socios masculinos y femeninos: cuántos hay y cuántos están cobrados
  const resumenGenero = useMemo(() => {
    if (!esSocio) return [];
    const estado = (p) => {
      const pagado = pagadoPor(refTipo, p.id);
      const cuota = num(p.cuota);
      if (cuota <= 0) return pagado > 0 ? "pagado" : "sincuota";
      if (pagado >= cuota) return "pagado";
      if (pagado > 0) return "parcial";
      return "pendiente";
    };
    return ["Masculino", "Femenino", "Sin indicar"].map((gen) => {
      const ps = personas.filter((p) => (p.genero || "Sin indicar") === gen);
      let cobrados = 0, parciales = 0, pendientes = 0, importe = 0;
      for (const p of ps) {
        const e = estado(p);
        if (e === "pagado") cobrados += 1;
        else if (e === "parcial") parciales += 1;
        else if (e === "pendiente") pendientes += 1;
        importe += pagadoPor(refTipo, p.id);
      }
      return { gen, n: ps.length, cobrados, parciales, pendientes, importe: r2(importe) };
    }).filter((r) => r.n > 0);
  }, [esSocio, personas, pagadoPor, refTipo]);

  const abrirPago = (p) => {
    const pendiente = Math.max(0, num(p.cuota) - pagadoPor(refTipo, p.id));
    setPago({
      refId: p.id, nombre: nombreCompleto(p),
      extra: esSocio ? p.numero : p.equipo,
      fecha: hoyISO(),
      importe: pendiente > 0 ? String(pendiente).replace(".", ",") : "",
      cuentaId: cuentas[0]?.id || "",
      forma: "Efectivo",
    });
  };

  const confirmarPago = () => {
    registrarPago({ refTipo, ...pago });
    setPago(null);
  };

  const pillEstado = (e) =>
    e === "pagado" ? ["Pagado", "bg-emerald-100 text-emerald-800"]
    : e === "parcial" ? ["Parcial", "bg-amber-100 text-amber-800"]
    : e === "pendiente" ? ["Pendiente", "bg-red-100 text-red-700"]
    : ["Sin cuota", "bg-slate-100 text-slate-500"];

  return (
    <>

            <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold">{l}</div>

          </div>
        ))}
      </div>

      {resumenGrupos.length > 0 && (
        <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
          <table className="w-full text-sm">

              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">

            </thead>
            <tbody className="divide-y divide-slate-100">
              {resumenGrupos.map((r) => (
                <tr key={r.grupo} className="hover:bg-slate-50 cursor-pointer"

                  <td className="px-4 py-2 font-semibold">{r.grupo}</td>
                  <td className="px-2 py-2 text-right tabular-nums">{r.n}</td>

                  <td className="px-2 py-2 text-right tabular-nums text-emerald-700">{eur(r.cobrado)}</td>

                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {esSocio && resumenGenero.length > 0 && (
        <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">

            <tbody className="divide-y divide-slate-100">

      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="font-bold mb-3">{editandoId ? "Editar ficha" : (esSocio ? "Alta de socio" : "Alta de jugador")}</h3>

            </p>

              <label className="text-xs font-semibold text-slate-600">Fecha
                <input type="date" value={pago.fecha} onChange={(e) => setPago({ ...pago, fecha: e.target.value })} className={inp} />
              </label>
              <label className="text-xs font-semibold text-slate-600">Importe (€)
                <input inputMode="decimal" value={pago.importe} onChange={(e) => setPago({ ...pago, importe: e.target.value })} className={inp + " tabular-nums"} />
              </label>
              <label className="text-xs font-semibold text-slate-600">Cuenta donde entra
                <select value={pago.cuentaId} onChange={(e) => setPago({ ...pago, cuentaId: e.target.value })} className={sel}>

                <select value={pago.forma} onChange={(e) => setPago({ ...pago, forma: e.target.value })} className={sel}>
                  {FORMAS.map((f) => <option key={f} value={f}>{f}</option>)}
                </select>

            <div className="flex gap-2 justify-end">
              <button onClick={() => setPago(null)} className="border border-slate-300 rounded-lg px-3 py-2 text-sm hover:bg-slate-50">Cancelar</button>
              <button onClick={confirmarPago} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-4 py-2 text-sm">Registrar pago</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function FragmentoPersona({ p, esSocio, pagado, pendiente, txt, cls, abiertoEste, setAbierto, abrirPago, editarPersona, quitarPersona, pagos, cuentaNombre, borrarPago, tempActiva }) {
  const cols = esSocio ? 12 : 7;
  return (
    <>
      <tr className="hover:bg-slate-50">
        <td className="px-4 py-2 tabular-nums font-semibold whitespace-nowrap">{esSocio ? p.numero : p.equipo}</td>
        <td className="px-2 py-2 max-w-52 truncate">{apellidosNombre(p)}</td>
        {esSocio && <td className="px-2 py-2 text-slate-600 whitespace-nowrap">{p.categoria || "—"}</td>}
        {esSocio && <td className="px-2 py-2 text-slate-600 whitespace-nowrap tabular-nums">{p.dni || "—"}</td>}
        {esSocio && <td className="px-2 py-2 text-slate-600 whitespace-nowrap max-w-32 truncate">{p.localidad || "—"}</td>}
        {esSocio && <td className="px-2 py-2 text-slate-600 whitespace-nowrap" title={p.genero || "Sin indicar"}>{p.genero === "Masculino" ? "M" : p.genero === "Femenino" ? "F" : "—"}</td>}
        {esSocio && <td className="px-2 py-2 text-slate-600 whitespace-nowrap">{p.telefono || "—"}</td>}
        <td className="px-2 py-2 text-right tabular-nums">{eur(p.cuota)}</td>
        <td className="px-2 py-2 text-right tabular-nums text-emerald-700">{eur(pagado)}</td>
        <td className={`px-2 py-2 text-right tabular-nums font-semibold ${pendiente > 0 ? "text-red-600" : "text-slate-400"}`}>{eur(pendiente)}</td>
        <td className="px-2 py-2"><span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${cls}`}>{txt}</span></td>
        <td className="px-2 py-2 whitespace-nowrap text-right">
          <button onClick={() => abrirPago(p)} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 rounded-lg px-2.5 py-1 text-xs font-semibold mr-2">+ Pago</button>
          <button onClick={() => setAbierto(abiertoEste ? null : p.id)} className="text-slate-500 hover:underline text-xs font-semibold mr-2">{abiertoEste ? "Ocultar" : "Pagos"}</button>
          <button onClick={() => editarPersona(p)} className="text-amber-700 hover:underline text-xs font-semibold mr-2">Editar</button>
          <button onClick={() => quitarPersona(p)} className="text-red-600 hover:underline text-xs font-semibold">Quitar</button>
        </td>
      </tr>
      {abiertoEste && (
        <tr className="bg-slate-50">
          <td colSpan={cols} className="px-6 py-3">
            {pagos.length === 0 ? (
              <p className="text-xs text-slate-500">Sin pagos registrados en la temporada {tempActiva}.</p>
            ) : (
              <ul className="space-y-1">
                {pagos.map((m) => (
                  <li key={m.id} className="flex items-center gap-3 text-xs text-slate-600">
                    <span className="tabular-nums">{fmtFecha(m.fecha)}</span>
                    <span className="font-semibold text-emerald-700 tabular-nums">{eur(m.importe)}</span>
                    <span>{m.forma}</span>
                    <span className="text-slate-400">→ {cuentaNombre(m.cuentaId)}</span>
                    <button onClick={() => borrarPago(m.id)} className="text-red-500 hover:underline font-semibold ml-auto">Borrar pago</button>
                  </li>
                ))}
              </ul>
            )}
          </td>
        </tr>
      )}
    </>
  );
}

// Pantalla de acceso con contraseña + información sobre la aplicación

function PantallaAcceso({ nombreClub, claveGuardada, onEntrar, onCrearClave }) {
  const hayClave = Boolean(claveGuardada);
  const [clave, setClave] = useState("");
  const [clave2, setClave2] = useState("");
  const [ver, setVer] = useState(false);
  const [error, setError] = useState("");
  const [infoAbierta, setInfoAbierta] = useState(false);

  const entrar = () => {
    if (hayClave) {
      if (!onEntrar(clave)) { setError("Contraseña incorrecta. Vuelve a intentarlo."); setClave(""); }
    } else {
      if (clave.trim().length < 4) return setError("La contraseña debe tener al menos 4 caracteres.");
      if (clave !== clave2) return setError("Las dos contraseñas no coinciden.");
      onCrearClave(clave.trim());
    }
  };

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-normal";

  return (
    <div className="min-h-screen bg-gradient-to-b from-zinc-950 via-zinc-900 to-zinc-800 font-sans flex items-center justify-center p-4">
      <div className="w-full max-w-md space-y-4">
        <div className="bg-white rounded-2xl shadow-2xl border-t-4 border-amber-400 p-6 space-y-4">
          <div className="flex flex-col items-center text-center gap-2">
            <div className="w-20 h-20 rounded-full bg-white border-4 border-amber-400 shadow-md overflow-hidden flex items-center justify-center">
              <img src={ESCUDO} alt="Escudo del club" className="w-full h-full object-contain" />
            </div>
            <div>
              <div className="text-[11px] uppercase tracking-[0.25em] text-amber-600 font-bold">Libro oficial de tesorería</div>
              <h1 className="font-display text-2xl font-extrabold tracking-tight text-slate-900">{nombreClub}</h1>
            </div>
          </div>

          {hayClave ? (
            <>
              <p className="text-sm text-slate-600 text-center">Esta aplicación está protegida. Escribe la contraseña de acceso para entrar.</p>
              <label className="block text-xs font-semibold text-slate-600">Contraseña
                <div className="relative">
                  <input type={ver ? "text" : "password"} value={clave} autoFocus
                    onChange={(e) => { setClave(e.target.value); setError(""); }}
                    onKeyDown={(e) => { if (e.key === "Enter") entrar(); }}
                    className={inp + " pr-16"} />
                  <button type="button" onClick={() => setVer(!ver)}
                    className="absolute right-2 top-1/2 -translate-y-1/2 mt-0.5 text-xs font-semibold text-slate-500 hover:text-slate-700">
                    {ver ? "Ocultar" : "Ver"}
                  </button>
                </div>
              </label>
            </>
          ) : (
            <>
              <p className="text-sm text-slate-600 text-center">
                Es la primera vez que se protege la aplicación: <b>crea la contraseña de acceso</b>. A partir de ahora se pedirá cada vez que se abra el libro de cuentas.
              </p>
              <label className="block text-xs font-semibold text-slate-600">Nueva contraseña (mínimo 4 caracteres)
                <input type={ver ? "text" : "password"} value={clave} autoFocus
                  onChange={(e) => { setClave(e.target.value); setError(""); }} className={inp} />
              </label>
              <label className="block text-xs font-semibold text-slate-600">Repite la contraseña
                <input type={ver ? "text" : "password"} value={clave2}
                  onChange={(e) => { setClave2(e.target.value); setError(""); }}
                  onKeyDown={(e) => { if (e.key === "Enter") entrar(); }} className={inp} />
              </label>
              <label className="flex items-center gap-2 text-xs text-slate-600">
                <input type="checkbox" checked={ver} onChange={(e) => setVer(e.target.checked)} className="rounded" />
                Mostrar la contraseña mientras escribo
              </label>
            </>
          )}

          {error && <p className="text-sm text-red-600 font-semibold text-center">{error}</p>}

          <button onClick={entrar}
            className="w-full bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-bold rounded-lg px-4 py-2.5 text-sm shadow">
            {hayClave ? "Entrar" : "Crear contraseña y entrar"}
          </button>
          {hayClave && (
            <p className="text-[11px] text-slate-400 text-center">
              La contraseña se cambia dentro de la aplicación, en la pestaña «Ajustes». Si se ha olvidado, quien tenga acceso a otro ordenador con la sesión abierta puede cambiarla desde allí.
            </p>
          )}
        </div>

        {/* Información sobre la aplicación */}
        <div className="bg-zinc-900/70 border border-zinc-700 rounded-2xl p-4 text-zinc-300">
          <button onClick={() => setInfoAbierta(!infoAbierta)} className="w-full flex items-center justify-between text-sm font-bold text-amber-300">
            <span>ℹ️ Información sobre la aplicación</span>
            <span>{infoAbierta ? "▲" : "▼"}</span>
          </button>
          {infoAbierta && (
            <div className="mt-3 text-xs leading-relaxed space-y-2">
              <p><b className="text-white">Libro de tesorería del club</b>: aplicación para llevar las cuentas de un club de fútbol amateur, temporada a temporada (de julio a junio).</p>
              <ul className="list-disc pl-4 space-y-1">
                <li><b>Resumen</b>: saldos de las cuentas, gráficas y pendientes de cobro.</li>
                <li><b>Movimientos, Traspasos y Caja</b>: ingresos, gastos y traspasos entre cuentas, con conciliación bancaria.</li>
                <li><b>Taquilla y Publicidad</b>: recaudación de entradas y rifas por partido, y cartelería con IVA.</li>
                <li><b>Socios y Cantera</b>: fichas con nº, DNI, localidad, género y teléfono; control de cuotas cobradas, parciales y pendientes.</li>
                <li><b>Presupuesto e Informe</b>: presupuesto por categorías e informe imprimible para la asamblea.</li>
                <li><b>Ajustes</b>: cuentas, categorías, precios de cuota, temporadas, contraseña de acceso y copias de seguridad (manual, automática a archivo, copias internas diarias y nube).</li>
              </ul>
              <p className="text-zinc-400">Los datos se guardan automáticamente en este ordenador y, si la nube está configurada, se comparten entre ordenadores. El acceso está protegido con contraseña.</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Cambio de contraseña desde Ajustes
function AjusteClave({ clave, onGuardar, setAviso }) {
  const [actual, setActual] = useState("");
  const [nueva, setNueva] = useState("");
  const [repite, setRepite] = useState("");
  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const hayClave = Boolean(clave);

  const guardar = () => {
    if (hayClave && actual !== clave) return setAviso("La contraseña actual no es correcta.");
    if (nueva.trim().length < 4) return setAviso("La nueva contraseña debe tener al menos 4 caracteres.");
    if (nueva !== repite) return setAviso("La nueva contraseña y su repetición no coinciden.");
    onGuardar(nueva.trim());
    setActual(""); setNueva(""); setRepite("");
    setAviso("Contraseña de acceso actualizada. Se pedirá la próxima vez que se abra la aplicación.");
  };

  return (
    <div className="pt-2 border-t border-slate-200 space-y-2">
      <h3 className="text-sm font-bold">Contraseña de acceso</h3>
      <div className="grid sm:grid-cols-3 gap-3">
        {hayClave && (
          <label className="text-xs font-semibold text-slate-600">Contraseña actual
            <input type="password" value={actual} onChange={(e) => setActual(e.target.value)} className={inp} />
          </label>
        )}
        <label className="text-xs font-semibold text-slate-600">{hayClave ? "Nueva contraseña" : "Contraseña (mín. 4 caracteres)"}
          <input type="password" value={nueva} onChange={(e) => setNueva(e.target.value)} className={inp} />
        </label>
        <label className="text-xs font-semibold text-slate-600">Repite la nueva
          <input type="password" value={repite} onChange={(e) => setRepite(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") guardar(); }} className={inp} />
        </label>
      </div>
      <button onClick={guardar} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-3 py-2 text-sm">
        {hayClave ? "Cambiar contraseña" : "Establecer contraseña"}
      </button>
      <p className="text-xs text-slate-500">La aplicación pide esta contraseña cada vez que se abre. Cámbiala aquí cuando quieras; el cambio se guarda con el resto de los datos (y se comparte por la nube entre ordenadores).</p>
    </div>
  );
}

function NuevoItem({ onAdd, placeholder }) {
  const [v, setV] = useState("");
  return (
    <div className="flex gap-2">
      <input value={v} onChange={(e) => setV(e.target.value)} placeholder={placeholder}
        onKeyDown={(e) => { if (e.key === "Enter") { onAdd(v.trim()); setV(""); } }}
        className="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm" />
      <button onClick={() => { onAdd(v.trim()); setV(""); }}
        className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-3 py-1.5 text-sm">Añadir</button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<TesoreriaClub />);

</script>
</body>
</html>
