<script>
// ── Sincronización en la nube (Firebase, la misma que usaba la aplicación anterior) ──
// Gracias a esto, todos los ordenadores que abran la dirección ven los mismos datos.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBwTEPIe1ELM1ymuvWKgA2yAQYKyO7hucA",
  authDomain: "contabilidadcdcayon.firebaseapp.com",
  projectId: "contabilidadcdcayon",
  storageBucket: "contabilidadcdcayon.firebasestorage.app",
  messagingSenderId: "719294567085",
  appId: "1:719294567085:web:27d0c70ecd672839042c24"
};
const FB_DOC = "tesoreria"; // documento propio de esta aplicación en la nube
let fbDb = null, fbListo = false, fbSyncTimer = null, fbOnRemoto = null, fbOnEstado = null;
function fbEstado(s) { try { if (fbOnEstado) fbOnEstado(s); } catch (e) {} }
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  fbDb = firebase.firestore();
  fbListo = true;
} catch (e) { console.error("Firebase no disponible; la app funcionará solo en este ordenador.", e); }

// Lee una vez los datos de la nube. Devuelve { motivo, datos }:
// motivo: "ok" | "vacio" (conectada pero sin datos) | "permisos" (reglas caducadas) | "error" | "sin"
function fbLeerUnaVez() {
  if (!fbListo) return Promise.resolve({ motivo: "sin", datos: null });
  return fbDb.collection("contabilidad").doc(FB_DOC).get()
    .then((snap) => {
      if (!snap.exists) return { motivo: "vacio", datos: null };
      const d = snap.data();
      let datos = null;
      if (d && d.json) { try { datos = JSON.parse(d.json); } catch (e) {} }
      return { motivo: datos ? "ok" : "vacio", datos };
    })
    .catch((e) => ({ motivo: (e && e.code === "permission-denied") ? "permisos" : "error", datos: null }));
}
// Avisa cuando otro ordenador guarda cambios
function fbEscuchar(cb) {
  fbOnRemoto = cb;
  if (!fbListo) return;
  fbDb.collection("contabilidad").doc(FB_DOC).onSnapshot((snap) => {
    if (!snap.exists) return;
    const d = snap.data();
    if (!d || !d.json) return;
    let remoto; try { remoto = JSON.parse(d.json); } catch (e) { return; }
    if (fbOnRemoto) fbOnRemoto(remoto);
  }, (err) => {
    console.error("Error escuchando la nube", err);
    fbEstado(err && err.code === "permission-denied" ? "permisos" : "error");
  });
}
// Guarda en la nube (con una pequeña espera para agrupar cambios seguidos)
function fbGuardar(obj) {
  if (!fbListo) { fbEstado("sin"); return; }
  clearTimeout(fbSyncTimer);
  fbSyncTimer = setTimeout(() => {
    fbDb.collection("contabilidad").doc(FB_DOC)
      .set({ json: JSON.stringify(obj), savedAt: obj.savedAt || Date.now() })
      .then(() => fbEstado("ok"))
      .catch((e) => {
        console.error("Error guardando en la nube", e);
        fbEstado(e && e.code === "permission-denied" ? "permisos" : "error");
      });
  }, 1000);
}
</script>

<script>
// Persistencia: si no existe window.storage (entorno Claude), se usa el
// almacenamiento local del navegador (localStorage).
if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("Key not found: " + key);
      return { key, value: v, shared: false };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix, shared: false };
    },
  };
}
</script>

// --- Recordar el archivo de copia automática entre sesiones (IndexedDB) ---
const idbGuardarHandle = (h) => new Promise((res, rej) => {
  const r = indexedDB.open("tesoreria-fs", 1);
  r.onupgradeneeded = () => r.result.createObjectStore("handles");
  r.onsuccess = () => {
    const tx = r.result.transaction("handles", "readwrite");
    tx.objectStore("handles").put(h, "backup");
    tx.oncomplete = () => res();
    tx.onerror = () => rej();
  };
  r.onerror = () => rej();
});
const idbLeerHandle = () => new Promise((res) => {
  try {
    const r = indexedDB.open("tesoreria-fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => {
      try {
        const g = r.result.transaction("handles", "readonly").objectStore("handles").get("backup");
        g.onsuccess = () => res(g.result || null);
        g.onerror = () => res(null);
      } catch { res(null); }
    };
    r.onerror = () => res(null);
  } catch { res(null); }
});
const idbBorrarHandle = () => new Promise((res) => {
  try {
    const r = indexedDB.open("tesoreria-fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => {
      const tx = r.result.transaction("handles", "readwrite");
      tx.objectStore("handles").delete("backup");
      tx.oncomplete = () => res();
      tx.onerror = () => res();
    };
    r.onerror = () => res();
  } catch { res(); }
});

const eur = (n) => new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" }).format(n || 0);
const r2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;
const hoyISO = () => new Date().toISOString().slice(0, 10);
const num = (v) => { const x = parseFloat(String(v).replace(",", ".")); return isNaN(x) ? 0 : x; };
const ent = (v) => { const x = parseInt(String(v), 10); return isNaN(x) ? 0 : x; };

const temporadaDe = (fecha) => {
  const d = new Date(fecha + "T00:00:00");
  const y = d.getFullYear();
  return d.getMonth() + 1 >= 7 ? `${y}/${y + 1}` : `${y - 1}/${y}`;
};
const esTemporadaValida = (t) => {
  const m = /^(\d{4})\/(\d{4})$/.exec(t);
  return m && Number(m[2]) === Number(m[1]) + 1;
};
const mesKey = (f) => f.slice(0, 7);
const mesLabel = (k) => { const [y, m] = k.split("-"); return `${MESES[parseInt(m, 10) - 1]} ${y}`; };
const fmtFecha = (f) => f.split("-").reverse().join("/");
const uid = (p) => `${p}${Date.now()}${Math.floor(Math.random() * 1000)}`;
const nombreCompleto = (p) => [p.nombre, p.apellidos].filter(Boolean).join(" ").trim();
const apellidosNombre = (p) => (p.apellidos ? `${p.apellidos}, ${p.nombre}` : p.nombre);

const vendidas = (desde, hasta) => {
  const d = ent(desde), h = ent(hasta);
  return d > 0 && h >= d ? h - d + 1 : 0;
};

  categorias: { ingreso: CATS_INGRESO, gasto: CATS_GASTO },
  equipos: EQUIPOS_DEF,
  catSocios: CAT_SOCIOS_DEF,
  temporadasExtra: [],
  socios: [],
  jugadores: [],
  taquillas: [],
  cartelera: [],
  presupuestos: {},
  movimientos: [],
});

// Migración desde versiones anteriores
function migrar(old) {
  if (!old) return defaultData();
  if (old.version === 6) return old;

  let d = old;
  // v1 → v2
  if (!old.version || old.version < 2) {
    const base = defaultData();
    base.config.nombre = old.config?.nombre || base.config.nombre;
    base.cuentas[0].saldoInicial = num(old.config?.saldoInicialBanco);
    base.cuentas[2].saldoInicial = num(old.config?.saldoInicialCaja);
    if (old.categorias) base.categorias = old.categorias;
    base.movimientos = (old.movimientos || []).map((m) => {
      const esBanco = m.metodo === "banco";
      if (m.tipo === "traspaso") {
        return { id: m.id, fecha: m.fecha, tipo: "traspaso", categoria: "Traspaso interno", concepto: m.concepto || "",
          importe: m.importe, cuentaId: esBanco ? "cta-banco" : "cta-caja", destinoId: esBanco ? "cta-caja" : "cta-banco", forma: "Otro" };
      }
      return { id: m.id, fecha: m.fecha, tipo: m.tipo, categoria: m.categoria, concepto: m.concepto || "",
        importe: m.importe, cuentaId: esBanco ? "cta-banco" : "cta-caja", forma: esBanco ? "Transferencia" : "Efectivo" };
    });
    d = base;
  }

  // → v6 (cubre también v2, v3, v4 y v5)
  const out = { ...defaultData(), ...d, version: 6 };
  out.taquillas = d.taquillas || [];
  out.cartelera = d.cartelera || [];
  out.presupuestos = d.presupuestos || {};
  out.equipos = d.equipos || EQUIPOS_DEF;
  out.cuentas = d.cuentas || cuentasDefecto();
  out.catSocios = d.catSocios || CAT_SOCIOS_DEF;
  out.temporadasExtra = d.temporadasExtra || [];
  if (out.cuentas.filter((c) => c.tipo === "banco").length < 2) {
    out.cuentas = [...out.cuentas, { id: uid("cta"), nombre: "Banco cuenta 2", tipo: "banco", saldoInicial: 0 }];
  }
  const cats = { ...out.categorias };
  for (const c of ["Taquilla (entradas)", "Rifas"]) if (!cats.ingreso.includes(c)) cats.ingreso = [...cats.ingreso, c];
  out.categorias = cats;
  out.config = { clave: "", ...(out.config || {}) };
  // separar apellidos (los antiguos quedan con todo en «nombre»)
  // y añadir los campos nuevos de la ficha de socio (DNI, localidad y género)
  out.socios = (d.socios || []).map((s) => ({ apellidos: "", categoria: "", dni: "", localidad: "", genero: "", ...s }));
  out.jugadores = (d.jugadores || []).map((j) => ({ apellidos: "", ...j }));
  return out;
}

function GraficaBarras({ datos }) {
  if (!datos || datos.length === 0) return null;
  const W = 720, H = 250, pL = 60, pB = 30, pT = 16, pR = 10;
  const max0 = Math.max(...datos.map((d) => Math.max(d.ingresos, d.gastos)), 1);
  const pot = Math.pow(10, Math.max(0, Math.floor(Math.log10(max0))));
  const max = Math.ceil(max0 / pot) * pot || 1;
  const y = (v) => pT + (H - pT - pB) * (1 - v / max);
  const grupo = (W - pL - pR) / datos.length;
  const bw = Math.min(28, grupo * 0.32);
  const abrev = (k) => MESES[parseInt(k.split("-")[1], 10) - 1].slice(0, 3);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" role="img" aria-label="Gráfica de ingresos y gastos por mes">
      {[0, 0.25, 0.5, 0.75, 1].map((f) => (
        <g key={f}>
          <line x1={pL} x2={W - pR} y1={y(max * f)} y2={y(max * f)} stroke="#e2e8f0" strokeWidth="1" />
          <text x={pL - 8} y={y(max * f) + 4} textAnchor="end" fontSize="10" fill="#64748b">
            {Math.round(max * f).toLocaleString("es-ES")} €
          </text>
        </g>
      ))}
      {datos.map((d, i) => {
        const cx = pL + grupo * i + grupo / 2;
        return (
          <g key={d.mes}>
            <rect x={cx - bw - 2} width={bw} y={y(d.ingresos)} height={Math.max(0, y(0) - y(d.ingresos))} rx="3" fill="#059669">
              <title>{`${mesLabel(d.mes)} · Ingresos: ${eur(d.ingresos)}`}</title>
            </rect>
            <rect x={cx + 2} width={bw} y={y(d.gastos)} height={Math.max(0, y(0) - y(d.gastos))} rx="3" fill="#ef4444">
              <title>{`${mesLabel(d.mes)} · Gastos: ${eur(d.gastos)}`}</title>
            </rect>
            <text x={cx} y={H - 10} textAnchor="middle" fontSize="10" fill="#475569" fontWeight="600">{abrev(d.mes)}</text>
          </g>
        );
      })}
      <line x1={pL} x2={W - pR} y1={y(0)} y2={y(0)} stroke="#94a3b8" strokeWidth="1.5" />
    </svg>
  );
}

function GraficaDonut({ items, tam = 150, grosor = 26 }) {
  const total = items.reduce((s, i) => s + i.valor, 0);
  if (total <= 0) return null;
  const r = (tam - grosor) / 2, C = 2 * Math.PI * r, c = tam / 2;
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${tam} ${tam}`} style={{ width: tam, height: tam }} className="shrink-0" role="img" aria-label="Gráfica de reparto">
      <circle cx={c} cy={c} r={r} fill="none" stroke="#f1f5f9" strokeWidth={grosor} />
      {items.map((it, i) => {
        const frac = it.valor / total;
        const seg = (
          <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={it.color} strokeWidth={grosor}
            strokeDasharray={`${frac * C} ${C}`} strokeDashoffset={-acc * C}
            transform={`rotate(-90 ${c} ${c})`} strokeLinecap="butt">
            <title>{`${it.label}: ${eur(it.valor)} (${Math.round(frac * 100)} %)`}</title>
          </circle>
        );
        acc += frac;
        return seg;
      })}
      <text x={c} y={c - 1} textAnchor="middle" fontSize="12" fontWeight="700" fill="#0f172a">{eur(total)}</text>
      <text x={c} y={c + 14} textAnchor="middle" fontSize="9" fill="#64748b">total</text>
    </svg>
  );
}

function TesoreriaClub() {
  const [data, setData] = useState(null);
  const [acceso, setAcceso] = useState(false); // acceso con contraseña (se pide al abrir la aplicación)
  const [tab, setTab] = useState("resumen");
  const [form, setForm] = useState(emptyMov());
  const [editId, setEditId] = useState(null);
  const [filtro, setFiltro] = useState({ mes: "todos", tipo: "todos", categoria: "todas", cuenta: "todas", forma: "todas", conc: "todos", texto: "" });
  const [tempSel, setTempSel] = useState("actual");
  const [aviso, setAviso] = useState("");
  const [cargando, setCargando] = useState(true);
  const [confirmaBorrado, setConfirmaBorrado] = useState(false);
  const [pendienteConfirm, setPendienteConfirm] = useState(null);
  const [selec, setSelec] = useState([]);
  const [confirmaBulk, setConfirmaBulk] = useState(false);
  const [printData, setPrintData] = useState(null);
  const [ultimoGuardado, setUltimoGuardado] = useState(null);
  const [autoBackup, setAutoBackup] = useState({ estado: "cargando" });
  const [ultimoBackup, setUltimoBackup] = useState(null);
  const [copiasInternas, setCopiasInternas] = useState([]);
  const [copiaSel, setCopiaSel] = useState("");
  const [confirmaRestaurar, setConfirmaRestaurar] = useState(false);
  const backupHandleRef = useRef(null);
  const dataRef = useRef(null);
  const [nubeEstado, setNubeEstado] = useState({ estado: "comprobando" });

  // Recibir avisos de estado de la nube (guardado correcto, permisos caducados, etc.)
  useEffect(() => {
    fbOnEstado = (s) => setNubeEstado({ estado: s, hora: new Date() });
    return () => { fbOnEstado = null; };
  }, []);

  // ---------- navegación por teclado en los formularios ----------
  // Enter: pasa al siguiente campo del formulario (y al llegar al botón, Enter lo pulsa).
  // Flechas ↑ / ↓: se mueven entre campos de texto. En los desplegables y en la fecha
  // las flechas siguen funcionando como siempre (cambiar la opción o el día).
  useEffect(() => {
    const alTeclear = (e) => {
      const el = document.activeElement;
      if (!el) return;
      const tag = el.tagName;
      if (tag !== "INPUT" && tag !== "SELECT") return;

      // Campos de texto normales (no fecha, no desplegable): en ellos las flechas ↑↓ pueden navegar
      const esTexto = tag === "INPUT" && !["date", "checkbox", "radio", "file", "number"].includes(el.type);

      let dir = 0;
      if (e.key === "Enter") dir = 1;
      else if (e.key === "ArrowDown" && esTexto) dir = 1;
      else if (e.key === "ArrowUp" && esTexto) dir = -1;
      if (!dir) return;

      // El formulario es la rejilla (div.grid) más cercana que contiene el campo
      const cont = el.closest("div.grid") || el.closest("form");
      if (!cont) return;

      // Campos visibles y utilizables de ese formulario, en orden
      const campos = Array.from(cont.querySelectorAll("input, select, textarea, button"))
        .filter((c) => !c.disabled && c.offsetParent !== null);
      const i = campos.indexOf(el);
      if (i === -1) return;

      const destino = campos[i + dir];
      if (!destino) return;

      e.preventDefault();
      destino.focus();
      // Si es un campo de texto, dejar el texto seleccionado para poder sobrescribirlo
      if (destino.tagName === "INPUT" && typeof destino.select === "function") {
        try { destino.select(); } catch { /* algunos tipos no lo permiten */ }
      }
    };
    document.addEventListener("keydown", alTeclear);
    return () => document.removeEventListener("keydown", alTeclear);
  }, []);

  // ---------- carga y guardado ----------
  useEffect(() => {
    (async () => {
      // 1) Datos guardados en este ordenador
      let local = null;
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r && r.value) local = JSON.parse(r.value);
      } catch { /* sin datos previos */ }
      // 2) Datos de la nube (compartidos entre todos los ordenadores)
      let resNube = { motivo: "error", datos: null };
      try { resNube = await fbLeerUnaVez(); } catch { /* sin conexión a la nube */ }
      const nube = resNube.datos;
      setNubeEstado({ estado: resNube.motivo });
      if (resNube.motivo === "vacio" && local && (local.movimientos || []).length > 0) {
        setAviso("La nube está conectada pero aún vacía: pulsa «Grabar» en la cabecera para subir los datos de este ordenador.");
      }
      // Se queda con el más reciente de los dos
      let elegido = local;
      if (nube && (!local || (nube.savedAt || 0) > (local.savedAt || 0))) elegido = nube;
      // Protección: nunca sustituir movimientos reales de este ordenador por una nube vacía
      if (elegido === nube && nube && (nube.movimientos || []).length === 0 && local && (local.movimientos || []).length > 0) {
        elegido = local;
        setAviso("Este ordenador tiene movimientos que aún no están en la nube: pulsa «Grabar» para subirlos.");
      }
      const d = migrar(elegido);
      setData(d);
      dataRef.current = d;
      if (elegido === nube && nube) {
        try { await window.storage.set(STORAGE_KEY, JSON.stringify(d)); } catch { /* nada */ }
      }
      setCargando(false);
      // 3) A partir de ahora, escuchar los cambios que graben otros ordenadores
      if (typeof fbEscuchar === "function") {
        fbEscuchar((remoto) => {
          const actual = dataRef.current;
          if (!remoto) return;
          // Protección: no aplicar una nube sin movimientos sobre datos reales
          if ((remoto.movimientos || []).length === 0 && actual && (actual.movimientos || []).length > 0) return;
          if ((remoto.savedAt || 0) > ((actual && actual.savedAt) || 0)) {
            const m = migrar(remoto);
            setData(m);
            dataRef.current = m;
            window.storage.set(STORAGE_KEY, JSON.stringify(m)).catch(() => {});
            setAviso("Datos actualizados desde otro ordenador ✓");
          }
        });
      }
    })();
  }, []);

  // Escribe la copia automática en el archivo elegido (si está activa)
  const escribirBackup = useCallback(async (next) => {
    const h = backupHandleRef.current;
    if (!h) return;
    try {
      if ((await h.queryPermission({ mode: "readwrite" })) !== "granted") return;
      const w = await h.createWritable();
      await w.write(JSON.stringify(next, null, 2));
      await w.close();
      setUltimoBackup(new Date());
    } catch { /* sin acceso en este momento */ }
  }, []);

  const persist = useCallback(async (next) => {
    next = { ...next, savedAt: Date.now() };
    setData(next);
    dataRef.current = next;
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
      setUltimoGuardado(new Date());
    }
    catch { setAviso("No se pudo guardar. Comprueba la conexión e inténtalo de nuevo."); }
    // Subir a la nube para que lo vean los demás ordenadores
    try { fbGuardar(next); } catch { /* sin conexión: se guarda localmente igualmente */ }
    // Copia automática al archivo (Chrome/Edge), sin bloquear la interfaz
    escribirBackup(next);
    // Copia interna del día (se conservan los últimos 7 días)
    (async () => {
      try {
        await window.storage.set(STORAGE_KEY + "-auto-" + hoyISO(), JSON.stringify(next));
        const l = await window.storage.list(STORAGE_KEY + "-auto-");
        const keys = (l?.keys || []).sort();
        while (keys.length > 7) await window.storage.delete(keys.shift());
      } catch { /* la copia interna es un extra, no interrumpe */ }
    })();
  }, [escribirBackup]);

  // Detectar si hay una copia automática configurada de sesiones anteriores
  useEffect(() => {
    (async () => {
      if (typeof window.showSaveFilePicker !== "function") {
        setAutoBackup({ estado: "nosoportado" });
        return;
      }
      const h = await idbLeerHandle();
      if (!h) { setAutoBackup({ estado: "no" }); return; }
      backupHandleRef.current = h;
      try {
        const p = await h.queryPermission({ mode: "readwrite" });
        setAutoBackup({ estado: p === "granted" ? "activo" : "pendiente", nombre: h.name });
      } catch {
        setAutoBackup({ estado: "no" });
      }
    })();
  }, []);

  const activarAutoBackup = async () => {
    try {
      const h = await window.showSaveFilePicker({
        suggestedName: "tesoreria_copia_automatica.json",
        types: [{ description: "Copia de seguridad de la tesorería", accept: { "application/json": [".json"] } }],
      });
      backupHandleRef.current = h;
      await idbGuardarHandle(h);
      setAutoBackup({ estado: "activo", nombre: h.name });
      await escribirBackup(data);
      setAviso(`Copia automática activada: «${h.name}» se actualizará solo cada vez que grabes algo.`);
    } catch { /* el usuario canceló el diálogo */ }
  };

  const reanudarAutoBackup = async () => {
    const h = backupHandleRef.current;
    if (!h) return;
    try {
      const p = await h.requestPermission({ mode: "readwrite" });
      if (p === "granted") {
        setAutoBackup({ estado: "activo", nombre: h.name });
        await escribirBackup(data);
        setAviso("Copia automática reanudada.");
      }
    } catch { /* nada */ }
  };

  const desactivarAutoBackup = async () => {
    backupHandleRef.current = null;
    await idbBorrarHandle();
    setAutoBackup({ estado: "no" });
    setAviso("Copia automática desactivada. Sigues teniendo las copias internas diarias y la copia manual.");
  };

  // Copias internas diarias: listar y restaurar
  const cargarCopiasInternas = useCallback(async () => {
    try {
      const l = await window.storage.list(STORAGE_KEY + "-auto-");
      const keys = (l?.keys || []).sort().reverse();
      setCopiasInternas(keys.map((k) => ({ key: k, dia: k.slice((STORAGE_KEY + "-auto-").length) })));
      if (keys.length > 0) setCopiaSel(keys[0]);
    } catch { setCopiasInternas([]); }
  }, []);

  useEffect(() => { if (tab === "ajustes") { cargarCopiasInternas(); setConfirmaRestaurar(false); } }, [tab, cargarCopiasInternas]);

  const restaurarCopiaInterna = async () => {
    if (!copiaSel) return;
    try {
      const r = await window.storage.get(copiaSel);
      const parsed = JSON.parse(r.value);
      await persist(migrar(parsed));
      setConfirmaRestaurar(false);
      setAviso(`Datos restaurados a la copia del ${fmtFecha(copiaSel.slice((STORAGE_KEY + "-auto-").length))}.`);
    } catch {
      setAviso("No se pudo restaurar esa copia interna.");
    }
  };

  useEffect(() => {
    const fin = () => setPrintData(null);
    window.addEventListener("afterprint", fin);
    return () => window.removeEventListener("afterprint", fin);
  }, []);

  useEffect(() => {
    if (!aviso) return;
    const t = setTimeout(() => setAviso(""), 4000);
    return () => clearTimeout(t);
  }, [aviso]);

  // ---------- derivados ----------
  const movs = data ? data.movimientos : [];
  const cuentas = data ? data.cuentas : [];
  const cuentaNombre = useCallback((id) => cuentas.find((c) => c.id === id)?.nombre || "—", [cuentas]);

  const saldos = useMemo(() => {
    const s = {};
    for (const c of cuentas) s[c.id] = num(c.saldoInicial);
    for (const m of movs) {
      const imp = num(m.importe);
      if (m.tipo === "ingreso") s[m.cuentaId] = (s[m.cuentaId] || 0) + imp;
      else if (m.tipo === "gasto") s[m.cuentaId] = (s[m.cuentaId] || 0) - imp;
      else if (m.tipo === "traspaso") {
        s[m.cuentaId] = (s[m.cuentaId] || 0) - imp;
        s[m.destinoId] = (s[m.destinoId] || 0) + imp;
      }
    }
    return s;
  }, [cuentas, movs]);

  const saldoTotal = useMemo(() => Object.values(saldos).reduce((a, b) => a + b, 0), [saldos]);

  const temporadas = useMemo(() => {
    const s = new Set(movs.map((m) => temporadaDe(m.fecha)));
    s.add(temporadaDe(hoyISO()));
    for (const t of (data?.temporadasExtra || [])) s.add(t);
    return [...s].sort().reverse();
  }, [movs, data]);

  const tempActiva = tempSel === "actual" ? temporadaDe(hoyISO()) : tempSel;
  const movsTemporada = useMemo(() => movs.filter((m) => temporadaDe(m.fecha) === tempActiva), [movs, tempActiva]);

  const informeMensual = useMemo(() => {
    const map = {};
    for (const m of movsTemporada) {
      if (m.tipo === "traspaso") continue;
      const k = mesKey(m.fecha);
      if (!map[k]) map[k] = { ingresos: 0, gastos: 0 };
      m.tipo === "ingreso" ? (map[k].ingresos += num(m.importe)) : (map[k].gastos += num(m.importe));
    }
    let acum = 0;
    return Object.keys(map).sort().map((k) => {
      const r = map[k].ingresos - map[k].gastos;
      acum += r;
      return { mes: k, ...map[k], resultado: r, acumulado: acum };
    });
  }, [movsTemporada]);

  const porCategoria = useMemo(() => {
    const ing = {}, gas = {};
    for (const m of movsTemporada) {
      if (m.tipo === "traspaso") continue;
      const d = m.tipo === "ingreso" ? ing : gas;
      d[m.categoria] = (d[m.categoria] || 0) + num(m.importe);
    }
    const ord = (o) => Object.entries(o).sort((a, b) => b[1] - a[1]);
    return { ingresos: ord(ing), gastos: ord(gas) };
  }, [movsTemporada]);

  const totalesTemp = useMemo(() => {
    const ti = porCategoria.ingresos.reduce((s, [, v]) => s + v, 0);
    const tg = porCategoria.gastos.reduce((s, [, v]) => s + v, 0);
    return { ingresos: ti, gastos: tg, resultado: ti - tg };
  }, [porCategoria]);

  const mesActualKey = hoyISO().slice(0, 7);
  const mesActual = useMemo(() => {
    let i = 0, g = 0;
    for (const m of movs) {
      if (mesKey(m.fecha) !== mesActualKey || m.tipo === "traspaso") continue;
      m.tipo === "ingreso" ? (i += num(m.importe)) : (g += num(m.importe));
    }
    return { ingresos: i, gastos: g };
  }, [movs, mesActualKey]);

  const mesesDisponibles = useMemo(() => [...new Set(movs.map((m) => mesKey(m.fecha)))].sort().reverse(), [movs]);

  const movsFiltrados = useMemo(() => {
    return movs
      .filter((m) => {
        if (filtro.mes !== "todos" && mesKey(m.fecha) !== filtro.mes) return false;
        if (filtro.tipo !== "todos" && m.tipo !== filtro.tipo) return false;
        if (filtro.categoria !== "todas" && m.categoria !== filtro.categoria) return false;
        if (filtro.cuenta !== "todas" && m.cuentaId !== filtro.cuenta && m.destinoId !== filtro.cuenta) return false;
        if (filtro.forma !== "todas" && m.forma !== filtro.forma) return false;
        if (filtro.conc === "si" && !m.conciliado) return false;
        if (filtro.conc === "no" && m.conciliado) return false;
        if (filtro.texto && !(`${m.concepto} ${m.categoria} ${m.empresa || ""}`.toLowerCase().includes(filtro.texto.toLowerCase()))) return false;
        return true;
      })
      .sort((a, b) => (a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : 0));
  }, [movs, filtro]);

  const pagadoPor = useCallback((refTipo, refId) =>
    movs.filter((m) => m.refTipo === refTipo && m.refId === refId && temporadaDe(m.fecha) === tempActiva)
        .reduce((s, m) => s + num(m.importe), 0),
  [movs, tempActiva]);

  const pagosDe = useCallback((refTipo, refId) =>
    movs.filter((m) => m.refTipo === refTipo && m.refId === refId && temporadaDe(m.fecha) === tempActiva)
        .sort((a, b) => (a.fecha < b.fecha ? 1 : -1)),
  [movs, tempActiva]);

  // ---------- pendiente de cobro (para el Resumen y el informe) ----------
  // Junta en un solo sitio todo lo que le deben al club esta temporada:
  // publicidad sin cobrar, socios con cuota sin pagar y cantera con cuota a medias.
  const pendientes = useMemo(() => {
    const pub = (data?.cartelera || []).filter((c) => c.estado !== "cobrado" && temporadaDe(c.fecha) === tempActiva);
    const pubTotal = pub.reduce((s, c) => s + num(c.total), 0);
    const cuotasDe = (lista, refTipo) => {
      let n = 0, total = 0;
      for (const p of lista || []) {
        const cuota = num(p.cuota);
        if (cuota <= 0) continue;
        const debe = r2(cuota - pagadoPor(refTipo, p.id));
        if (debe > 0) { n += 1; total += debe; }
      }
      return { n, total: r2(total) };
    };
    const soc = cuotasDe(data?.socios, "socio");
    const cant = cuotasDe(data?.jugadores, "jugador");
    return { pub: { n: pub.length, total: r2(pubTotal) }, soc, cant, total: r2(pubTotal + soc.total + cant.total) };
  }, [data, tempActiva, pagadoPor]);

  // ---------- ejecución del presupuesto (para el Resumen y el informe) ----------
  // Compara lo presupuestado con lo real de la temporada activa, por categoría.
  const presupuestoResumen = useMemo(() => {
    const pres = data?.presupuestos?.[tempActiva];
    if (!pres) return null;
    const bloque = (tipo) => {
      const reales = tipo === "ingreso" ? porCategoria.ingresos : porCategoria.gastos;
      const realDe = (cat) => { const f = reales.find(([c]) => c === cat); return f ? f[1] : 0; };
      const cats = Object.entries(pres[tipo] || {})
        .map(([cat, v]) => ({ cat, pres: num(v) }))
        .filter((x) => x.pres > 0)
        .map((x) => ({ ...x, real: realDe(x.cat), pct: (realDe(x.cat) / x.pres) * 100 }))
        .sort((a, b) => b.pct - a.pct);
      const totalPres = cats.reduce((s, x) => s + x.pres, 0);
      const totalReal = tipo === "ingreso" ? totalesTemp.ingresos : totalesTemp.gastos;
      return { cats, totalPres, totalReal, pct: totalPres > 0 ? (totalReal / totalPres) * 100 : 0 };
    };
    const gasto = bloque("gasto"), ingreso = bloque("ingreso");
    if (gasto.totalPres <= 0 && ingreso.totalPres <= 0) return null;
    return { gasto, ingreso };
  }, [data, tempActiva, porCategoria, totalesTemp]);

  // ---------- acciones movimientos ----------
  const pedirConfirmacion = (mov, onConfirm) => setPendienteConfirm({ mov, onConfirm });

  const guardarMovimiento = () => {
    const imp = num(form.importe);
    if (!form.fecha) return setAviso("Falta la fecha del movimiento.");
    if (imp <= 0) return setAviso("Escribe un importe mayor que cero.");
    if (!form.cuentaId) return setAviso("Elige la cuenta.");
    if (form.tipo !== "traspaso" && !form.categoria) return setAviso("Elige una categoría.");
    if (form.tipo === "traspaso" && (!form.destinoId || form.destinoId === form.cuentaId))
      return setAviso("En un traspaso, la cuenta de destino debe ser distinta a la de origen.");
    const prev = editId ? movs.find((m) => m.id === editId) : null;
    const mov = {
      id: editId || uid("m"),
      fecha: form.fecha,
      tipo: form.tipo,
      categoria: form.tipo === "traspaso" ? "Traspaso interno" : form.categoria,
      empresa: (form.empresa || "").trim(),
      concepto: form.concepto.trim(),
      importe: imp,
      cuentaId: form.cuentaId,
      destinoId: form.tipo === "traspaso" ? form.destinoId : undefined,
      forma: form.forma,
      refTipo: prev?.refTipo,
      refId: prev?.refId,
      conciliado: prev?.conciliado || false,
    };
    const esEdicion = Boolean(editId);
    pedirConfirmacion(mov, () => {
      persist({ ...data, movimientos: esEdicion ? movs.map((m) => (m.id === mov.id ? mov : m)) : [...movs, mov] });
      setForm({ ...emptyMov(), fecha: mov.fecha, tipo: mov.tipo, cuentaId: mov.cuentaId, forma: mov.forma });
      setEditId(null);
      setAviso(esEdicion ? "Movimiento actualizado y grabado." : "Movimiento grabado correctamente.");
    });
  };

  const grabarAhora = async () => {
    await persist(data);
    setAviso("Datos grabados correctamente. (La aplicación también graba sola tras cada cambio.)");
  };

  const borrarSeleccionados = () => {
    const n = selec.length;
    persist({ ...data, movimientos: movs.filter((m) => !selec.includes(m.id)) });
    setSelec([]);
    setConfirmaBulk(false);
    setAviso(`${n} movimiento${n === 1 ? "" : "s"} borrado${n === 1 ? "" : "s"}.`);
  };

  const imprimirMovs = () => {
    const filas = selec.length > 0 ? movsFiltrados.filter((m) => selec.includes(m.id)) : movsFiltrados;
    if (filas.length === 0) return setAviso("No hay movimientos que imprimir con los filtros actuales.");
    setPrintData({ filas, cuentaFiltro: filtro.cuenta, mesFiltro: filtro.mes, soloSeleccion: selec.length > 0 });
    setTimeout(() => window.print(), 350);
  };

  // Informe de temporada con formato limpio para la asamblea o la junta directiva
  const imprimirInforme = () => {
    if (informeMensual.length === 0) return setAviso(`Sin movimientos en la temporada ${tempActiva}: no hay nada que imprimir.`);
    setPrintData({ informe: true });
    setTimeout(() => window.print(), 350);
  };

  // ---------- conciliación bancaria ----------
  const toggleConciliado = (id) =>
    persist({ ...data, movimientos: movs.map((m) => (m.id === id ? { ...m, conciliado: !m.conciliado } : m)) });

  const conciliarSeleccionados = (valor) => {
    persist({ ...data, movimientos: movs.map((m) => (selec.includes(m.id) ? { ...m, conciliado: valor } : m)) });
    setAviso(valor
      ? `${selec.length} movimiento${selec.length === 1 ? "" : "s"} marcado${selec.length === 1 ? "" : "s"} como conciliado${selec.length === 1 ? "" : "s"} con el banco.`
      : "Conciliación quitada a la selección.");
    setSelec([]);
  };

  // Resumen de conciliación de la cuenta filtrada
  const conciliacion = useMemo(() => {
    if (filtro.cuenta === "todas") return null;
    const c = cuentas.find((x) => x.id === filtro.cuenta);
    if (!c) return null;
    let saldoConc = num(c.saldoInicial), pendientes = 0, sumaPend = 0;
    for (const m of movs) {
      if (m.cuentaId !== c.id && m.destinoId !== c.id) continue;
      let delta = 0;
      if (m.tipo === "ingreso") delta = num(m.importe);
      else if (m.tipo === "gasto") delta = -num(m.importe);
      else if (m.tipo === "traspaso") delta = m.destinoId === c.id ? num(m.importe) : -num(m.importe);
      if (m.conciliado) saldoConc += delta;
      else { pendientes += 1; sumaPend += delta; }
    }
    return { cuenta: c, saldoConc, pendientes, sumaPend };
  }, [filtro.cuenta, cuentas, movs]);

  const editarMov = (m) => {
    setEditId(m.id);
    setForm({ fecha: m.fecha, tipo: m.tipo, categoria: m.tipo === "traspaso" ? "" : m.categoria,
      empresa: m.empresa || "", concepto: m.concepto, importe: String(m.importe), cuentaId: m.cuentaId, destinoId: m.destinoId || "", forma: m.forma || "Transferencia" });
    setTab("movimientos");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // Duplicar: rellena el formulario con los datos de un movimiento existente
  // (con la fecha de hoy) para anotar uno nuevo igual sin teclearlo entero.
  // Muy útil para gastos que se repiten: arbitrajes, luz, gestoría, lavandería…
  const duplicarMov = (m) => {
    setEditId(null);
    setForm({ fecha: hoyISO(), tipo: m.tipo, categoria: m.tipo === "traspaso" ? "" : m.categoria,
      empresa: m.empresa || "", concepto: m.concepto, importe: String(m.importe), cuentaId: m.cuentaId, destinoId: m.destinoId || "", forma: m.forma || "Transferencia" });
    setTab("movimientos");
    window.scrollTo({ top: 0, behavior: "smooth" });
    setAviso("Movimiento copiado al formulario con la fecha de hoy: revisa fecha e importe y pulsa «Anotar».");
  };

  const borrarMov = (id) => persist({ ...data, movimientos: movs.filter((m) => m.id !== id) });

  const anotarRapido = (mov) => {
    persist({ ...data, movimientos: [...movs, { ...mov, id: uid("m") }] });
    setAviso("Movimiento anotado en caja.");
  };

  // ---------- pagos de cuota ----------
  const registrarPago = ({ refTipo, refId, nombre, extra, fecha, importe, cuentaId, forma }) => {
    const imp = num(importe);
    if (imp <= 0) return setAviso("Escribe un importe mayor que cero.");
    if (!cuentaId) return setAviso("Elige la cuenta donde entra el dinero.");
    const mov = {
      id: uid("p"), fecha, tipo: "ingreso",
      categoria: refTipo === "socio" ? "Cuotas de socios" : "Cuotas categorías inferiores",
      concepto: `Cuota ${refTipo === "socio" ? `socio nº ${extra}` : extra} — ${nombre} (${tempActiva})`,
      importe: imp, cuentaId, forma, refTipo, refId,
    };
    persist({ ...data, movimientos: [...movs, mov] });
    setAviso("Pago registrado como ingreso.");
  };

  // ---------- taquilla ----------
  const guardarTaquilla = (t, idEdit) => {
    const n5 = vendidas(t.e5desde, t.e5hasta);
    const n10 = vendidas(t.e10desde, t.e10hasta);
    const nAnt = vendidas(t.aDesde, t.aHasta);
    const nTiras = vendidas(t.rDesde, t.rHasta);
    if (nTiras > 100) { setAviso("La rifa tiene como máximo 100 tiras (de la 1 a la 100)."); return false; }
    if (ent(t.rHasta) > 100) { setAviso("El número de tira no puede pasar de 100."); return false; }
    if (!t.fecha) { setAviso("Falta la fecha del partido."); return false; }
    if (!t.concepto.trim()) { setAviso("Escribe el partido o concepto (p. ej. «vs CD Rival, jornada 5»)."); return false; }
    if (!t.cuentaId) { setAviso("Elige la cuenta donde entra la recaudación."); return false; }
    if (n5 + n10 + nAnt + nTiras === 0) { setAviso("Indica al menos un rango de entradas, anticipadas o tiras vendidas."); return false; }

    const totalEnt = n5 * num(t.precio5) + n10 * num(t.precio10) + nAnt * num(t.precioAnt);
    const totalRifa = nTiras * num(t.precioTira);
    const reg = {
      id: idEdit || uid("t"),
      fecha: t.fecha, concepto: t.concepto.trim(), cuentaId: t.cuentaId, forma: t.forma,
      e5desde: ent(t.e5desde), e5hasta: ent(t.e5hasta), precio5: num(t.precio5),
      e10desde: ent(t.e10desde), e10hasta: ent(t.e10hasta), precio10: num(t.precio10),
      aDesde: ent(t.aDesde), aHasta: ent(t.aHasta), precioAnt: num(t.precioAnt),
      rDesde: ent(t.rDesde), rHasta: ent(t.rHasta), precioTira: num(t.precioTira),
    };

    let lista = [...movs];
    const upsert = (refTipo, categoria, concepto, importe) => {
      const ix = lista.findIndex((m) => m.refTipo === refTipo && m.refId === reg.id);
      if (importe > 0) {
        const mov = { id: ix >= 0 ? lista[ix].id : uid("mt"), fecha: reg.fecha, tipo: "ingreso", categoria,
          concepto, importe, cuentaId: reg.cuentaId, forma: reg.forma, refTipo, refId: reg.id };
        ix >= 0 ? (lista[ix] = mov) : lista.push(mov);
      } else if (ix >= 0) lista.splice(ix, 1);
    };
    const partesEnt = [];
    if (n5 > 0) partesEnt.push(`${n5}×${eur(reg.precio5)}`);
    if (n10 > 0) partesEnt.push(`${n10}×${eur(reg.precio10)}`);
    if (nAnt > 0) partesEnt.push(`${nAnt} anticipadas×${eur(reg.precioAnt)}`);
    upsert("taq-ent", "Taquilla (entradas)", `Taquilla ${reg.concepto} (${partesEnt.join(" + ")})`, totalEnt);
    upsert("taq-rifa", "Rifas", `Rifa ${reg.concepto} (${nTiras} tiras × ${eur(reg.precioTira)})`, totalRifa);

    const taquillas = idEdit ? data.taquillas.map((x) => (x.id === idEdit ? reg : x)) : [...data.taquillas, reg];
    persist({ ...data, taquillas, movimientos: lista });
    setAviso(idEdit ? "Taquilla actualizada (y sus ingresos)." : `Taquilla anotada: ${eur(totalEnt + totalRifa)} de recaudación.`);
    return true;
  };

  const borrarTaquilla = (id) => {
    persist({
      ...data,
      taquillas: data.taquillas.filter((t) => t.id !== id),
      movimientos: movs.filter((m) => !((m.refTipo === "taq-ent" || m.refTipo === "taq-rifa") && m.refId === id)),
    });
    setAviso("Taquilla eliminada junto con sus ingresos.");
  };

  // ---------- cartelería / publicidad ----------
  const guardarCartel = (c, idEdit) => {
    const base = num(c.base);
    if (!c.fecha) { setAviso("Falta la fecha."); return false; }
    if (!c.cliente.trim()) { setAviso("Escribe el nombre del anunciante o patrocinador."); return false; }
    if (base <= 0) { setAviso("La base imponible debe ser mayor que cero."); return false; }
    if (c.estado === "cobrado" && !c.cuentaId) { setAviso("Elige la cuenta donde entra el cobro."); return false; }

    const ivaDef = IVAS.find((i) => i.id === c.iva) || IVAS[2];
    const cuotaIva = Math.round(base * ivaDef.pct) / 100;
    const total = base + cuotaIva;
    const reg = {
      id: idEdit || uid("c"),
      fecha: c.fecha, cliente: c.cliente.trim(), tipo: c.tipo, concepto: (c.concepto || "").trim(),
      base, iva: ivaDef.id, cuotaIva, total,
      estado: c.estado, cuentaId: c.cuentaId, forma: c.forma,
    };

    let lista = [...movs];
    const ix = lista.findIndex((m) => m.refTipo === "cart" && m.refId === reg.id);
    if (reg.estado === "cobrado") {
      const mov = {
        id: ix >= 0 ? lista[ix].id : uid("mc"),
        fecha: reg.fecha, tipo: "ingreso", categoria: TIPOS_CART[reg.tipo].cat,
        concepto: `Publicidad ${TIPOS_CART[reg.tipo].label} — ${reg.cliente}${reg.concepto ? ` (${reg.concepto})` : ""}${ivaDef.pct > 0 ? ` · base ${eur(base)} + IVA ${ivaDef.pct}% ${eur(cuotaIva)}` : " · exento de IVA"}`,
        importe: total, cuentaId: reg.cuentaId, forma: reg.forma, refTipo: "cart", refId: reg.id,
      };
      ix >= 0 ? (lista[ix] = mov) : lista.push(mov);
    } else if (ix >= 0) {
      lista.splice(ix, 1); // pasa a pendiente: se retira el ingreso
    }

    const cartelera = idEdit ? data.cartelera.map((x) => (x.id === idEdit ? reg : x)) : [...data.cartelera, reg];
    persist({ ...data, cartelera, movimientos: lista });
    setAviso(reg.estado === "cobrado"
      ? `Publicidad anotada y cobrada: ${eur(total)} en ${cuentaNombre(reg.cuentaId)}.`
      : "Publicidad anotada como pendiente de cobro (no suma al saldo hasta que la marques cobrada).");
    return true;
  };

  const borrarCartel = (id) => {
    persist({
      ...data,
      cartelera: data.cartelera.filter((c) => c.id !== id),
      movimientos: movs.filter((m) => !(m.refTipo === "cart" && m.refId === id)),
    });
    setAviso("Contrato de publicidad eliminado junto con su ingreso.");
  };

  // ---------- exportar / reiniciar ----------
  const exportarCSV = () => {
    const filas = [["Fecha", "Tipo", "Categoría", "Concepto", "Cuenta", "Destino", "Forma de pago", "Importe"]];
    [...movs].sort((a, b) => (a.fecha > b.fecha ? 1 : -1)).forEach((m) =>
      filas.push([m.fecha, m.tipo, m.categoria, m.concepto, cuentaNombre(m.cuentaId),
        m.destinoId ? cuentaNombre(m.destinoId) : "", m.forma || "", String(m.importe).replace(".", ",")]));
    const csv = filas.map((f) => f.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `tesoreria_${tempActiva.replace("/", "-")}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const borrarTodo = async () => {
    await persist(defaultData());
    setConfirmaBorrado(false);
    setAviso("Datos reiniciados.");
  };

  const exportarBackup = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `tesoreria_copia_${hoyISO()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    setAviso("Copia de seguridad descargada. Guárdala en un lugar seguro.");
  };

  // Copia manual a pen-drive: abre el diálogo del sistema para elegir dónde
  // guardar (p. ej. el USB). Si el navegador no lo permite, descarga el archivo.
  const guardarEnPendrive = async () => {
    const contenido = JSON.stringify(data, null, 2);
    const nombre = `tesoreria_copia_${hoyISO()}.json`;
    if (typeof window.showSaveFilePicker === "function") {
      try {
        const h = await window.showSaveFilePicker({
          suggestedName: nombre,
          types: [{ description: "Copia de seguridad de la tesorería", accept: { "application/json": [".json"] } }],
        });
        const w = await h.createWritable();
        await w.write(contenido);
        await w.close();
        setAviso(`Copia guardada en «${h.name}». Para verla en otro ordenador, abre allí la aplicación y usa Ajustes → «Restaurar copia».`);
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return; // el usuario canceló el diálogo
        /* si falla por otro motivo, se descarga como archivo normal */
      }
    }
    const blob = new Blob([contenido], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    a.click();
    URL.revokeObjectURL(a.href);
    setAviso("Copia descargada en tu carpeta de Descargas. Cópiala al pen-drive y, en otro ordenador, usa Ajustes → «Restaurar copia».");
  };

  const importarBackup = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !Array.isArray(parsed.movimientos)) throw new Error("formato");
        persist(migrar(parsed));
        setAviso("Copia de seguridad restaurada correctamente.");
      } catch {
        setAviso("Ese archivo no parece una copia de seguridad válida de la tesorería.");
      }
    };
    reader.readAsText(file);
  };

  // ---------- UI helpers ----------
  const chip = (t) => t === "ingreso" ? "bg-emerald-100 text-emerald-800" : t === "gasto" ? "bg-red-100 text-red-700" : "bg-amber-100 text-amber-800";

  const Tab = ({ id, children }) => (
    <button onClick={() => setTab(id)}
      className={`px-3 sm:px-4 py-2 text-sm font-semibold rounded-t-lg border-b-2 whitespace-nowrap transition-colors ${
        tab === id ? "border-amber-400 text-white" : "border-transparent text-zinc-400 hover:text-white"}`}>
      {children}
    </button>
  );

  if (cargando || !data) {
    return <div className="min-h-screen bg-slate-100 flex items-center justify-center font-sans text-slate-500">Cargando el libro de cuentas…</div>;
  }

  // ---------- acceso con contraseña ----------
  if (!acceso) {
    return (
      <PantallaAcceso
        nombreClub={data.config.nombre}
        claveGuardada={data.config.clave || ""}
        onEntrar={(clave) => {
          if (clave === (data.config.clave || "")) { setAcceso(true); return true; }
          return false;
        }}
        onCrearClave={(clave) => {
          persist({ ...data, config: { ...data.config, clave } });
          setAcceso(true);
        }}
      />
    );
  }

  const catsForm = form.tipo === "ingreso" ? data.categorias.ingreso : data.categorias.gasto;
  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";
  const iniciales = ((data.config.nombre || "CF").split(/\s+/).map((w) => w[0]).join("")
    .replace(/[^A-Za-z0-9ÁÉÍÓÚÑáéíóúñ]/g, "").slice(0, 3).toUpperCase()) || "CF";
  void iniciales;

  return (
    <div className="min-h-screen bg-slate-100 font-sans text-slate-800">
      {/* Cabecera */}
      <header className="bg-gradient-to-r from-zinc-950 via-zinc-900 to-black text-white border-b-4 border-amber-400 shadow-lg">
        <div className="max-w-6xl mx-auto px-4 pt-6 pb-0">
          <div className="flex flex-wrap items-center justify-between gap-4 pb-4">
            <div className="flex items-center gap-4">
              <div className="w-16 h-16 rounded-full bg-white border-4 border-amber-400 shadow-md shrink-0 overflow-hidden flex items-center justify-center">
                <img src={ESCUDO} alt="Escudo CD Cayón" className="w-full h-full object-contain" />
              </div>
              <div>
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-[11px] uppercase tracking-[0.25em] text-amber-300 font-bold">Libro oficial de tesorería</span>
                  <select value={tempSel} onChange={(e) => setTempSel(e.target.value)}
                    className="bg-zinc-950 border border-zinc-600 text-white rounded-lg px-2 py-1 text-xs font-semibold">
                    <option value="actual">Temporada actual ({temporadaDe(hoyISO())})</option>
                    {temporadas.map((t) => <option key={t} value={t}>Temporada {t}</option>)}
                  </select>
                </div>
                <h1 className="font-display text-2xl sm:text-3xl font-extrabold tracking-tight mt-1 drop-shadow-sm">{data.config.nombre}</h1>
              </div>
            </div>
            <div className="flex items-end gap-3">
              <div className="text-right">
                <button onClick={guardarEnPendrive}
                  title="Guarda una copia de seguridad de todos los datos en un pen-drive u otro archivo"
                  className="border border-zinc-600 bg-zinc-800/80 hover:bg-zinc-700 text-white font-semibold rounded-lg px-3 py-2 text-sm shadow">
                  💾 Copia a pen-drive
                </button>
                <div className="text-[10px] text-zinc-400 mt-1">Hazla de vez en cuando</div>
              </div>
              <div className="text-right">
                <button onClick={grabarAhora}
                  className="bg-amber-400 hover:bg-amber-300 border border-amber-300 text-zinc-950 font-bold rounded-lg px-4 py-2 text-sm shadow">
                  Grabar
                </button>
                <div className="text-[10px] text-zinc-400 mt-1 tabular-nums">
                  {ultimoGuardado
                    ? `Grabado a las ${ultimoGuardado.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" })}`
                    : "Autoguardado activo"}
                </div>
                <div className="text-[10px] mt-0.5 font-semibold">
                  {nubeEstado.estado === "comprobando" && <span className="text-zinc-400">☁️ Conectando con la nube…</span>}
                  {nubeEstado.estado === "ok" && <span className="text-emerald-300">☁️ Nube conectada</span>}
                  {nubeEstado.estado === "vacio" && <span className="text-amber-300">☁️ Nube conectada, aún sin datos</span>}
                  {nubeEstado.estado === "permisos" && <span className="text-red-300">⚠️ Nube bloqueada (permisos)</span>}
                  {(nubeEstado.estado === "sin" || nubeEstado.estado === "error") && <span className="text-red-300">☁️ Sin conexión con la nube</span>}
                </div>
              </div>
              <div className="bg-zinc-950/80 border border-amber-400/50 rounded-lg px-5 py-2 text-right shadow">
                <div className="text-[10px] uppercase tracking-widest text-amber-300 font-bold">Saldo total</div>
                <div className={`text-xl font-bold tabular-nums ${saldoTotal < 0 ? "text-red-300" : "text-white"}`}>{eur(saldoTotal)}</div>
              </div>
            </div>
          </div>
          <nav className="flex gap-1 overflow-x-auto">
            <Tab id="resumen">Resumen</Tab>
            <Tab id="movimientos">Movimientos</Tab>
            <Tab id="traspasos">Traspasos</Tab>
            <Tab id="taquilla">Taquilla</Tab>
            <Tab id="publicidad">Publicidad</Tab>
            <Tab id="caja">Caja</Tab>
            <Tab id="socios">Socios</Tab>
            <Tab id="cantera">Cantera</Tab>
            <Tab id="presupuesto">Presupuesto</Tab>
            <Tab id="informe">Informe</Tab>
            <Tab id="ajustes">Ajustes</Tab>
          </nav>
        </div>
      </header>

      {nubeEstado.estado === "permisos" && (
        <div className="max-w-6xl mx-auto px-4 mt-3">
          <div className="bg-red-50 border border-red-300 text-red-900 text-sm rounded-lg px-4 py-3">
            <b>La sincronización entre ordenadores está bloqueada</b> porque han caducado los permisos de la base de datos (Firebase los limita a 30 días en «modo de prueba»). Se arregla una sola vez y en un minuto:
            entra en <b>console.firebase.google.com</b> con tu cuenta de Google → proyecto <b>contabilidadcdcayon</b> → <b>Firestore Database</b> → pestaña <b>Reglas</b> → verás una línea parecida a <i>allow read, write: if request.time &lt; timestamp.date(2026, 7, 20)</i> → cambia la fecha por una lejana, por ejemplo <b>timestamp.date(2035, 1, 1)</b> → pulsa <b>Publicar</b>. Después recarga esta página. Mientras tanto, la aplicación sigue funcionando, pero solo en este ordenador.
          </div>
        </div>
      )}

      {aviso && (
        <div className="max-w-6xl mx-auto px-4 mt-3">
          <div className="bg-amber-50 border border-amber-300 text-amber-900 text-sm rounded-lg px-4 py-2">{aviso}</div>
        </div>
      )}

      <main className="max-w-6xl mx-auto px-4 py-6 space-y-6">

        {/* ------------------ RESUMEN ------------------ */}
        {tab === "resumen" && (
          <>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
              {cuentas.map((c) => (
                <div key={c.id} className={`bg-white rounded-xl border border-slate-200 border-t-4 ${COLOR_TIPO[c.tipo] || "border-t-slate-400"} p-4 shadow-sm`}>
                  <div className="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">{TIPOS_CUENTA[c.tipo] || c.tipo}</div>
                  <div className="text-sm font-semibold truncate">{c.nombre}</div>
                  <div className={`text-xl font-bold tabular-nums mt-1 ${saldos[c.id] < 0 ? "text-red-600" : "text-slate-800"}`}>{eur(saldos[c.id])}</div>
                </div>
              ))}
            </div>

            <div className="grid sm:grid-cols-3 gap-4">
              <div className="bg-white rounded-xl border border-slate-200 border-t-4 border-t-emerald-500 p-4 shadow-sm">
                <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold">Ingresos · {mesLabel(mesActualKey)}</div>

                    </span>

                  <p className="text-xs text-slate-500">

                  </p>
                )}

                  <>
                    <button onClick={activarAutoBackup} className="bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-3 py-2 text-sm">

                    </button>
                    <p className="text-xs text-slate-500">

                    </button>

                      className="w-20 bg-transparent border-b border-slate-300 focus:border-amber-500 outline-none text-sm py-0.5 text-right tabular-nums" />
                    <span className="text-xs text-slate-500">€</span>
                    <button onClick={() => persist({ ...data, catSocios: data.catSocios.filter((_, j) => j !== i) })}
                      className="text-slate-400 hover:text-red-600 text-xs font-semibold">Quitar</button>

                      <span className="truncate">{c}</span>
                      <button onClick={() => persist({ ...data, categorias: { ...data.categorias, [tipo]: data.categorias[tipo].filter((x) => x !== c) } })}

          <div className="mt-10 grid grid-cols-2 gap-8 text-xs">
            <div><div className="border-t border-slate-500 pt-1 mt-8">Firma: El Tesorero</div></div>
            <div><div className="border-t border-slate-500 pt-1 mt-8">Vº Bº: El Presidente</div></div>
          </div>
        </div>
      )}

      <style>{`
        .solo-imprimir { display: none; }
        @media print {
          body { background: white !important; }
          body * { visibility: hidden; }
          .solo-imprimir { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }

      <footer className="max-w-6xl mx-auto px-4 pb-8 text-xs text-slate-400">

  );

// ==================================================================
// Panel de Presupuesto: previsto vs. real por temporada
// ==================================================================
function PanelPresupuesto({ data, persist, tempActiva, porCategoria, totalesTemp, temporadas, setAviso }) {
  const pres = data.presupuestos?.[tempActiva] || { ingreso: {}, gasto: {} };
  const [copiaDe, setCopiaDe] = useState("");

  const realDe = (tipo, cat) => {
    const lista = tipo === "ingreso" ? porCategoria.ingresos : porCategoria.gastos;
    const f = lista.find(([c]) => c === cat);
    return f ? f[1] : 0;
  };

  const setImporte = (tipo, cat, valor) => {
    const nuevo = { ...pres, [tipo]: { ...pres[tipo], [cat]: valor.replace(",", ".") } };
    persist({ ...data, presupuestos: { ...(data.presupuestos || {}), [tempActiva]: nuevo } });
  };

  // categorías del ajuste + las que tengan real aunque se hayan quitado
  const catsDe = (tipo) => {
    const base = [...data.categorias[tipo]];
    const reales = (tipo === "ingreso" ? porCategoria.ingresos : porCategoria.gastos).map(([c]) => c);
    for (const c of reales) if (!base.includes(c)) base.push(c);
    for (const c of Object.keys(pres[tipo] || {})) if (!base.includes(c) && num(pres[tipo][c]) > 0) base.push(c);
    return base;
  };

  const totalPres = (tipo) => catsDe(tipo).reduce((s, c) => s + num(pres[tipo]?.[c]), 0);
  const presIng = totalPres("ingreso"), presGas = totalPres("gasto");

  const otrasConPresupuesto = temporadas.filter((t) => t !== tempActiva && data.presupuestos?.[t]);
  const copiar = () => {
    if (!copiaDe || !data.presupuestos?.[copiaDe]) return;
    persist({ ...data, presupuestos: { ...(data.presupuestos || {}), [tempActiva]: JSON.parse(JSON.stringify(data.presupuestos[copiaDe])) } });
    setAviso(`Presupuesto copiado de la temporada ${copiaDe}. Ajusta las cifras que cambien.`);
  };

  // Añadir y quitar categorías (son las mismas de toda la aplicación)
  const añadirCategoria = (tipo, nombre) => {
    const n = (nombre || "").trim();
    if (!n) return;
    if (data.categorias[tipo].includes(n)) return setAviso("Esa categoría ya existe.");
    persist({ ...data, categorias: { ...data.categorias, [tipo]: [...data.categorias[tipo], n] } });
    setAviso(`Categoría «${n}» añadida. Ya puedes presupuestarla y usarla al anotar movimientos.`);
  };

  const quitarCategoria = (tipo, cat) => {
    const nuevasCats = { ...data.categorias, [tipo]: data.categorias[tipo].filter((c) => c !== cat) };
    // quitar también su importe presupuestado en esta temporada
    const presTipo = { ...(pres[tipo] || {}) };
    delete presTipo[cat];
    const nuevoPres = { ...pres, [tipo]: presTipo };
    persist({ ...data, categorias: nuevasCats, presupuestos: { ...(data.presupuestos || {}), [tempActiva]: nuevoPres } });
    setAviso(realDe(tipo, cat) > 0
      ? `Categoría «${cat}» quitada de la lista. Sigue apareciendo esta temporada porque tiene movimientos reales grabados.`
      : `Categoría «${cat}» quitada (también del resto de la aplicación). Los movimientos antiguos que la usaran no se borran.`);
  };

  const inp = "w-24 border border-slate-300 rounded-lg px-2 py-1 text-sm text-right tabular-nums focus:border-amber-500 outline-none";

  const Bloque = ({ tipo, titulo, colorReal, colorBarra }) => {
    const cats = catsDe(tipo);
    const tp = totalPres(tipo);
    const tr = cats.reduce((s, c) => s + realDe(tipo, c), 0);
    return (
      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
        <div className="px-4 py-3 border-b border-slate-200">
          <h3 className="font-bold">{titulo}</h3>
        </div>
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">
              <th className="px-4 py-2">Categoría</th>
              <th className="px-2 py-2 text-right">Presupuestado</th>
              <th className="px-2 py-2 text-right">Real</th>
              <th className="px-2 py-2 text-right">Desviación</th>
              <th className="px-4 py-2 w-40">% ejecutado</th>
              <th className="px-2 py-2 w-8"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {cats.map((cat) => {
              const p = num(pres[tipo]?.[cat]);
              const r = realDe(tipo, cat);
              const desv = r - p;
              const desvBuena = tipo === "ingreso" ? desv >= 0 : desv <= 0;
              const pct = p > 0 ? (r / p) * 100 : (r > 0 ? 100 : 0);
              return (
                <tr key={cat} className="hover:bg-slate-50">
                  <td className="px-4 py-1.5 max-w-52 truncate">{cat}</td>
                  <td className="px-2 py-1.5 text-right">
                    <input inputMode="decimal" placeholder="0"
                      value={pres[tipo]?.[cat] ?? ""}
                      onChange={(e) => setImporte(tipo, cat, e.target.value)}
                      className={inp} />
                  </td>
                  <td className={`px-2 py-1.5 text-right tabular-nums font-semibold ${colorReal}`}>{r > 0 ? eur(r) : "—"}</td>
                  <td className={`px-2 py-1.5 text-right tabular-nums font-semibold ${p === 0 && r === 0 ? "text-slate-300" : desvBuena ? "text-emerald-700" : "text-red-600"}`}>
                    {p === 0 && r === 0 ? "—" : `${desv >= 0 ? "+" : "−"}${eur(Math.abs(desv))}`}
                  </td>
                  <td className="px-4 py-1.5">
                    {p > 0 ? (
                      <div className="flex items-center gap-2">
                        <div className="h-2 bg-slate-100 rounded-full flex-1">
                          <div className={`h-2 rounded-full ${pct > 100 ? (tipo === "gasto" ? "bg-red-500" : "bg-emerald-600") : colorBarra}`}
                            style={{ width: `${Math.min(100, pct)}%` }} />
                        </div>
                        <span className={`text-xs tabular-nums w-11 text-right font-semibold ${pct > 100 && tipo === "gasto" ? "text-red-600" : "text-slate-600"}`}>
                          {Math.round(pct)} %
                        </span>
                      </div>
                    ) : <span className="text-xs text-slate-300">sin presupuesto</span>}
                  </td>
                  <td className="px-2 py-1.5 text-center">
                    <button onClick={() => quitarCategoria(tipo, cat)}
                      title={`Quitar la categoría «${cat}»`}
                      className="text-slate-300 hover:text-red-600 font-bold text-base leading-none px-1">×</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr className="border-t-2 border-slate-300 bg-slate-50 font-bold">
              <td className="px-4 py-2">Total</td>
              <td className="px-2 py-2 text-right tabular-nums">{eur(tp)}</td>
              <td className={`px-2 py-2 text-right tabular-nums ${colorReal}`}>{eur(tr)}</td>
              <td className={`px-2 py-2 text-right tabular-nums ${(tipo === "ingreso" ? tr - tp >= 0 : tr - tp <= 0) ? "text-emerald-700" : "text-red-600"}`}>
                {`${tr - tp >= 0 ? "+" : "−"}${eur(Math.abs(tr - tp))}`}
              </td>
              <td className="px-4 py-2 text-xs tabular-nums text-slate-600" colSpan={2}>{tp > 0 ? `${Math.round((tr / tp) * 100)} % ejecutado` : ""}</td>
            </tr>
          </tfoot>
        </table>
        <div className="px-4 py-3 border-t border-slate-200 bg-slate-50/60">
          <div className="max-w-md">
            <NuevoItem placeholder={`Añadir categoría de ${tipo === "ingreso" ? "ingresos" : "gastos"}…`}
              onAdd={(n) => añadirCategoria(tipo, n)} />
          </div>
        </div>
      </div>
    );
  };

  const resPrev = presIng - presGas;
  const resReal = totalesTemp.resultado;

  return (
    <>
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg mr-auto">Presupuesto · temporada {tempActiva}</h2>
        {otrasConPresupuesto.length > 0 && (
          <span className="flex items-center gap-2 text-sm">
            <select value={copiaDe} onChange={(e) => setCopiaDe(e.target.value)}
              className="border border-slate-300 rounded-lg px-2 py-1.5 text-sm bg-white">
              <option value="">Copiar de otra temporada…</option>
              {otrasConPresupuesto.map((t) => <option key={t} value={t}>{t}</option>)}
            </select>
            {copiaDe && (
              <button onClick={copiar} className="border border-zinc-900 text-zinc-900 hover:bg-amber-50 font-semibold rounded-lg px-3 py-1.5 text-sm">Copiar</button>
            )}
          </span>
        )}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {[
          ["Ingresos previstos", eur(presIng), "text-slate-800", "border-t-emerald-500"],
          ["Gastos previstos", eur(presGas), "text-slate-800", "border-t-red-500"],
          ["Resultado previsto", eur(resPrev), resPrev < 0 ? "text-red-600" : "text-emerald-700", "border-t-amber-400"],
          ["Resultado real", eur(resReal), resReal < 0 ? "text-red-600" : "text-emerald-700", "border-t-amber-500"],
        ].map(([l, v, c, b]) => (
          <div key={l} className={`bg-white rounded-xl border border-slate-200 border-t-4 ${b} p-4 shadow-sm`}>
            <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold">{l}</div>
            <div className={`text-xl font-bold tabular-nums mt-1 ${c}`}>{v}</div>
          </div>
        ))}
      </div>

      {resPrev !== 0 || resReal !== 0 ? (
        <div className={`rounded-xl border px-4 py-3 text-sm ${resReal >= resPrev ? "bg-emerald-50 border-emerald-300 text-emerald-900" : "bg-amber-50 border-amber-300 text-amber-900"}`}>
          {resReal >= resPrev
            ? <>✓ La temporada va <b>{eur(Math.abs(resReal - resPrev))}</b> mejor que lo presupuestado.</>
            : <>⚠ La temporada va <b>{eur(Math.abs(resPrev - resReal))}</b> por debajo de lo presupuestado. Revisa en las tablas qué categorías se desvían.</>}
        </div>
      ) : null}

      {Bloque({ tipo: "ingreso", titulo: "Presupuesto de ingresos", colorReal: "text-emerald-700", colorBarra: "bg-emerald-600" })}
      {Bloque({ tipo: "gasto", titulo: "Presupuesto de gastos", colorReal: "text-red-600", colorBarra: "bg-amber-400" })}

      <p className="text-xs text-slate-500">
        Escribe en «Presupuestado» lo que prevés para la temporada en cada categoría; el «Real» sale solo de los movimientos grabados y se actualiza al momento. En los gastos, la barra se pone roja al pasar del 100 % del presupuesto. Con «×» quitas una categoría y con el cuadro de abajo añades nuevas: son las mismas categorías de toda la aplicación (Movimientos, Caja, Informe…), así que lo que cambies aquí vale para todo. El presupuesto es independiente por temporada: cámbiala en la cabecera para preparar el del año que viene.
      </p>
    </>
  );
}

// ==================================================================
// Panel de Traspasos entre cuentas del club
// ==================================================================
function PanelTraspasos({ cuentas, saldos, movs, cuentaNombre, pedirConfirmacion, onGuardar, borrarMov }) {
  const vacio = () => ({
    fecha: hoyISO(),
    cuentaId: cuentas.find((c) => c.tipo === "efectivo")?.id || cuentas[0]?.id || "",
    destinoId: cuentas.find((c) => c.tipo === "banco")?.id || cuentas[1]?.id || "",
    importe: "", concepto: "", forma: "Efectivo",
  });
  const [f, setF] = useState(vacio());
  const [editId, setEditId] = useState(null);
  const [aviso, setAvisoLocal] = useState("");

  const inp = "mt-1 w-full border border-slate-300 rounded-lg px-2 py-2 text-sm font-normal";
  const sel = inp + " bg-white";

  const imp = num(f.importe);
  const saldoOrigen = saldos[f.cuentaId] || 0;
  const saldoDestino = saldos[f.destinoId] || 0;

  const intercambiar = () => setF({ ...f, cuentaId: f.destinoId, destinoId: f.cuentaId });

  const guardar = () => {
    if (!f.fecha) return setAvisoLocal("Falta la fecha del traspaso.");
    if (imp <= 0) return setAvisoLocal("Escribe un importe mayor que cero.");
    if (!f.cuentaId || !f.destinoId) return setAvisoLocal("Elige las dos cuentas.");
    if (f.cuentaId === f.destinoId) return setAvisoLocal("La cuenta de origen y la de destino deben ser distintas.");
    setAvisoLocal("");
    const mov = {
      id: editId || uid("m"),
      fecha: f.fecha, tipo: "traspaso", categoria: "Traspaso interno",
      concepto: f.concepto.trim(), importe: imp,
      cuentaId: f.cuentaId, destinoId: f.destinoId, forma: f.forma,
    };
    const esEdicion = Boolean(editId);
    pedirConfirmacion(mov, () => {
      onGuardar(mov, esEdicion);
      setF(vacio());
      setEditId(null);
    });
  };

  const editar = (m) => {
    setEditId(m.id);
    setF({ fecha: m.fecha, cuentaId: m.cuentaId, destinoId: m.destinoId, importe: String(m.importe), concepto: m.concepto || "", forma: m.forma || "Efectivo" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const lista = movs
    .filter((m) => m.tipo === "traspaso")
    .sort((a, b) => (a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : 0));

  return (
    <>
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg mr-auto">Traspasos entre cuentas</h2>
      </div>

      {/* Saldos de todas las cuentas a la vista */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        {cuentas.map((c) => (
          <div key={c.id}
            className={`bg-white rounded-xl border p-3 ${c.id === f.cuentaId ? "border-red-300 ring-1 ring-red-200" : c.id === f.destinoId ? "border-emerald-400 ring-1 ring-emerald-200" : "border-slate-200"}`}>
            <div className="text-xs font-semibold truncate">{c.nombre}
              {c.id === f.cuentaId && <span className="text-red-600 font-bold ml-1">origen</span>}
              {c.id === f.destinoId && <span className="text-emerald-700 font-bold ml-1">destino</span>}
            </div>
            <div className={`text-lg font-bold tabular-nums ${saldos[c.id] < 0 ? "text-red-600" : "text-slate-800"}`}>{eur(saldos[c.id])}</div>
          </div>
        ))}
      </div>

      {/* Formulario */}
      <div className="bg-white rounded-xl border border-slate-200 p-4">
        <h3 className="font-bold mb-3">{editId ? "Editar traspaso" : "Nuevo traspaso"}</h3>
        {aviso && <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-3 py-2 mb-3">{aviso}</div>}
        <div className="grid grid-cols-2 sm:grid-cols-6 gap-3 items-end">
          <label className="text-xs font-semibold text-slate-600">Fecha
            <input type="date" value={f.fecha} onChange={(e) => setF({ ...f, fecha: e.target.value })} className={inp} />
          </label>
          <label className="text-xs font-semibold text-slate-600">Desde (origen)
            <select value={f.cuentaId} onChange={(e) => setF({ ...f, cuentaId: e.target.value })} className={sel}>
              {cuentas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </label>
          <div className="flex justify-center">
            <button onClick={intercambiar} title="Intercambiar origen y destino"
              className="border border-slate-300 hover:bg-slate-50 rounded-lg px-3 py-2 text-sm font-bold">⇄</button>
          </div>
          <label className="text-xs font-semibold text-slate-600">Hasta (destino)
            <select value={f.destinoId} onChange={(e) => setF({ ...f, destinoId: e.target.value })} className={sel}>
              {cuentas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </label>
          <label className="text-xs font-semibold text-slate-600">Importe (€)
            <input inputMode="decimal" placeholder="0,00" value={f.importe}
              onChange={(e) => setF({ ...f, importe: e.target.value })} className={inp + " tabular-nums"} />
          </label>
          <label className="text-xs font-semibold text-slate-600">Forma
            <select value={f.forma} onChange={(e) => setF({ ...f, forma: e.target.value })} className={sel}>
              {FORMAS.map((x) => <option key={x} value={x}>{x}</option>)}
            </select>
          </label>
          <label className="col-span-2 sm:col-span-4 text-xs font-semibold text-slate-600">Concepto
            <input placeholder="p. ej. ingreso en banco de la recaudación de taquilla, liquidación Federación…" value={f.concepto}
              onChange={(e) => setF({ ...f, concepto: e.target.value })} className={inp} />
          </label>
          <div className="col-span-2 flex gap-2">
            <button onClick={guardar} className="flex-1 bg-zinc-900 hover:bg-zinc-800 text-amber-300 font-semibold rounded-lg px-4 py-2 text-sm">
              {editId ? "Guardar cambios" : "Hacer traspaso"}
            </button>
            {editId && (
              <button onClick={() => { setEditId(null); setF(vacio()); }}
                className="border border-slate-300 rounded-lg px-3 py-2 text-sm hover:bg-slate-50">Cancelar</button>
            )}
          </div>
        </div>

        {/* Vista previa del efecto */}
        {imp > 0 && f.cuentaId !== f.destinoId && (
          <div className="mt-3 grid sm:grid-cols-2 gap-3 text-sm">
            <div className="bg-slate-50 rounded-lg px-3 py-2 tabular-nums">
              <b>{cuentaNombre(f.cuentaId)}</b>: {eur(saldoOrigen)} → <b className={saldoOrigen - imp < 0 ? "text-red-600" : "text-slate-800"}>{eur(saldoOrigen - imp)}</b>
              {saldoOrigen - imp < 0 && <span className="text-red-600 text-xs font-semibold ml-2">⚠ quedaría en negativo</span>}
            </div>
            <div className="bg-slate-50 rounded-lg px-3 py-2 tabular-nums">
              <b>{cuentaNombre(f.destinoId)}</b>: {eur(saldoDestino)} → <b className="text-emerald-700">{eur(saldoDestino + imp)}</b>
            </div>
          </div>
        )}
        <p className="text-xs text-slate-500 mt-2">
          Un traspaso mueve dinero entre cuentas del club sin contar como ingreso ni gasto: ingresar en el banco el efectivo de la caja, sacar efectivo del banco para la caja, cobrar la liquidación de la cuenta Federación, dotar la cuenta Mutualidad, o mover dinero entre los dos bancos.
        </p>
      </div>

      {/* Historial */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <div className="px-4 py-3 border-b border-slate-200">
          <h3 className="font-bold">Historial de traspasos ({lista.length})</h3>
        </div>
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">
              <th className="px-4 py-2">Fecha</th>
              <th className="px-2 py-2">Desde</th>
              <th className="px-2 py-2">Hasta</th>
              <th className="px-2 py-2">Concepto</th>
              <th className="px-2 py-2">Forma</th>
              <th className="px-2 py-2 text-right">Importe</th>
              <th className="px-2 py-2"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {lista.length === 0 && (
              <tr><td colSpan={7} className="px-4 py-6 text-slate-500">Todavía no hay traspasos. Usa el formulario de arriba para el primero.</td></tr>
            )}
            {lista.map((m) => (
              <tr key={m.id} className="hover:bg-slate-50">
                <td className="px-4 py-2 tabular-nums text-slate-600 whitespace-nowrap">{fmtFecha(m.fecha)}</td>
                <td className="px-2 py-2 max-w-36 truncate text-red-700 font-semibold">{cuentaNombre(m.cuentaId)}</td>
                <td className="px-2 py-2 max-w-36 truncate text-emerald-700 font-semibold">→ {cuentaNombre(m.destinoId)}</td>
                <td className="px-2 py-2 max-w-52 truncate text-slate-600">{m.concepto || "—"}</td>
                <td className="px-2 py-2 text-slate-600 whitespace-nowrap">{m.forma}</td>
                <td className="px-2 py-2 text-right tabular-nums font-bold text-amber-700">{eur(m.importe)}</td>
                <td className="px-2 py-2 whitespace-nowrap text-right">
                  <button onClick={() => editar(m)} className="text-amber-700 hover:underline text-xs font-semibold mr-2">Editar</button>
                  <button onClick={() => borrarMov(m.id)} className="text-red-600 hover:underline text-xs font-semibold">Borrar</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}
